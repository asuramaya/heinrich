[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "heinrich"
version = "0.1.0"
description = "Model forensics and signal-mixing pipeline."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy", "safetensors>=0.4"]

[project.optional-dependencies]
dev = ["pytest>=8"]
fetch = ["huggingface_hub>=0.20"]
probe = ["torch", "transformers>=4.45"]
dormant = ["jsinfer"]
all = ["huggingface_hub>=0.20", "torch", "transformers>=4.45", "jsinfer"]

[project.scripts]
heinrich = "heinrich.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
