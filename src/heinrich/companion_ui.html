<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const CL={latin:0x4477AA,CJK:0xEE6677,Cyrillic:0x228833,code:0xCCBB44,Arabic:0x66CCEE,Japanese:0xAA3377,Korean:0x999999,Thai:0x44BB99,Hebrew:0xEE8866,other:0xAAAAAA,special:0x666666};
const CLh=Object.fromEntries(Object.entries(CL).map(([k,v])=>[k,'#'+v.toString(16).padStart(6,'0')]));
let allL=[],dm=null,cL=0,play=false;
const vpPairs=[[0,1],[0,2],[2,3]];// [pairA, delta(pcA0×pcB0), pairB]
let model='',mode='',scripts=[],texts=[],nN=0,nK=0,nL=0,_layerVar=[];
const _hiddenScripts=new Set();// scripts toggled off by legend clicks
const api=p=>fetch('/api/'+p).then(r=>r.json());
function f16(h){const s=(h>>15)&1,e=(h>>10)&0x1f,m=h&0x3ff;if(e===0)return m===0?0:(s?-1:1)*2**-14*(m/1024);if(e===31)return m?NaN:(s?-Infinity:Infinity);return(s?-1:1)*2**(e-15)*(1+m/1024);}

const NV=6,NC=3,_DPR=Math.min(devicePixelRatio,1.5);// 0=cloudA,1=deltaCloud,2=cloudB,3=trajA,4=deltaTraj,5=trajB
// --- Single shared WebGL renderer ---
const glCanvas=document.getElementById('glCanvas');
const rdr=new THREE.WebGLRenderer({canvas:glCanvas,antialias:true,logarithmicDepthBuffer:true});
rdr.setPixelRatio(_DPR);rdr.setSize(window.innerWidth,window.innerHeight);
rdr.autoClear=false;rdr.setScissorTest(true);
function _renderRegion(el,sc,cam){
  const r=el.getBoundingClientRect();const w=r.width,h=r.height;if(w<=0||h<=0)return;
  const x=r.left,y=window.innerHeight-r.bottom;
  cam.aspect=w/h;cam.updateProjectionMatrix();
  rdr.setViewport(x,y,w,h);rdr.setScissor(x,y,w,h);rdr.render(sc,cam);
}
const views=[];
let _lastVP=0;
for(let v=0;v<NV;v++){const el=document.getElementById('vp'+v);const sc=new THREE.Scene();sc.background=new THREE.Color(v>=NC?0x080808:0x0a0a0a);const cam=new THREE.PerspectiveCamera(50,1,0.001,200);cam.position.set(0,0,2.5);const ctl=new OrbitControls(cam,el);ctl.enableDamping=true;ctl.dampingFactor=0.08;ctl.minDistance=0.005;ctl.mouseButtons={LEFT:THREE.MOUSE.ROTATE,MIDDLE:THREE.MOUSE.PAN,RIGHT:null};el.addEventListener('pointerenter',()=>{_lastVP=v;});const geo=new THREE.BufferGeometry();const mtl=new THREE.PointsMaterial({size:0.02,vertexColors:true,transparent:true,opacity:0.85,sizeAttenuation:true,depthWrite:false});const pts=new THREE.Points(geo,mtl);sc.add(pts);views.push({el,cv:el,sc,cam,ctl,geo,mtl,pts,pcX:0,pcY:1,pcZ:2,layer:0,trajGroup:null});}
function _resizeCanvas(){rdr.setSize(window.innerWidth,window.innerHeight);}

// Dual browser panels — same scene, two cameras focused on different PC neighborhoods
const brSc=new THREE.Scene();brSc.background=new THREE.Color(0x050505);
const _brPanels=[];
['br0topA','br0topB'].forEach((id,pi)=>{
  const el=document.getElementById(id);
  const cam=new THREE.PerspectiveCamera(50,1,0.1,500);cam.position.set(0,0,15);
  const ctl=new OrbitControls(cam,el);ctl.enableDamping=true;ctl.dampingFactor=0.08;ctl.target.set(0,0,0);ctl.mouseButtons={LEFT:THREE.MOUSE.ROTATE,MIDDLE:THREE.MOUSE.PAN,RIGHT:null};
  ctl.addEventListener('change',_markDirty);
  _brPanels.push({el,cam,ctl,focusPC:-1});
});
const brEl=_brPanels[0].el,brCv=brEl;
const brCam=_brPanels[0].cam,brCtl=_brPanels[0].ctl;
let brMeshes=[];
function resizeAll(){_resizeCanvas();_markDirty();}
addEventListener('resize',resizeAll);
const ro=new ResizeObserver(()=>{_resizeCanvas();_markDirty();});views.forEach(v=>ro.observe(v.el));_brPanels.forEach(p=>ro.observe(p.el));requestAnimationFrame(resizeAll);

// Markers + paths
const ray=new THREE.Raycaster();const ms=new THREE.Vector2();
let hoveredToken=-1,pinnedToken=-1;
const highlightMarkers=views.map(v=>{const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(3),3));const p=new THREE.Points(g,new THREE.PointsMaterial({size:0.06,color:0xFFFFFF,transparent:true,opacity:0.9,sizeAttenuation:true,depthWrite:false,depthTest:false}));p.renderOrder=10;p.visible=false;v.sc.add(p);return p;});
const pinMarkers=views.map(v=>{const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(3),3));const p=new THREE.Points(g,new THREE.PointsMaterial({size:0.14,color:0xFF6644,transparent:true,opacity:1.0,sizeAttenuation:true,depthWrite:false,depthTest:false}));p.renderOrder=10;p.visible=false;v.sc.add(p);return p;});
const pinMarkersB=views.map(v=>{const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(3),3));const p=new THREE.Points(g,new THREE.PointsMaterial({size:0.14,color:0x4477AA,transparent:true,opacity:1.0,sizeAttenuation:true,depthWrite:false,depthTest:false}));p.renderOrder=10;p.visible=false;v.sc.add(p);return p;});
const hoverPaths=views.map(v=>{const l=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0.45,depthWrite:false}));l.visible=false;l.frustumCulled=false;v.sc.add(l);return l;});
const pinPaths=views.map(v=>{const l=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:0xFF6644,transparent:true,opacity:0.95,depthWrite:false}));l.visible=false;l.frustumCulled=false;v.sc.add(l);return l;});
const pinPathsB=views.map(v=>{const l=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:0x4477AA,transparent:true,opacity:0.95,depthWrite:false}));l.visible=false;l.frustumCulled=false;v.sc.add(l);return l;});
// Position marker from PRECOMPUTED buffers (not filtered geometry) — always correct
function _positionMarker(mk,v,vi,idx){const pos=mk.geometry.attributes.position.array;
  // Read from precomputed source, not the filtered geometry
  const src=vi<NC?(v._cloudBufs&&v._cloudBufs[cL]):(v._trajBufs&&v._trajBufs[cL]);
  if(src&&idx*3+2<src.length){pos[0]=src[idx*3];pos[1]=src[idx*3+1];pos[2]=src[idx*3+2];}
  else{const cpos=v.geo.attributes.position?.array;
    if(cpos&&cpos.length>0&&idx*3+2<cpos.length){pos[0]=cpos[idx*3];pos[1]=cpos[idx*3+1];pos[2]=cpos[idx*3+2];}
    else{pos[0]=0;pos[1]=0;pos[2]=0;}}
  mk.geometry.attributes.position.needsUpdate=true;}
// === Three-tier PC data cache ===
// Full: [nLayers * nTokens] per PC — for selected PCs. Clouds + trajectories.
// Medium: [nLayers * nSample] per PC — for radial neighbors.
// Light: per-token all-PCs — for spectrum. (existing _pcsFullA/B)
const _pcFull=new Map();// pc -> Float32Array[nLayers*nTokens]
const _pcMedium=new Map();// pc -> {step, nS, data: Float32Array[nLayers*nSample]}
let _pcFullNL=0,_pcFullNT=0;
let _pcMedStep=10,_pcMedNS=0;

function _getScore(l,i,pc){
  // Tier 1: full resolution cache (primary path for ALL PCs)
  const full=_pcFull.get(pc);
  if(full)return full[l*_pcFullNT+i]||0;
  // Tier 2: blob fallback (first nK PCs, initial load only)
  if(pc<nK&&allL[l]?.[i])return allL[l][i][pc]||0;
  // Tier 3: medium resolution (sampled, for radial neighbors)
  const med=_pcMedium.get(pc);
  if(med){const si=Math.floor(i/med.step);if(si<med.nS)return med.data[l*med.nS+si]||0;}
  return 0;
}

async function _loadPCFull(pc){
  if(_pcFull.has(pc))return;// already cached — no nK limit
  const resp=await fetch(`/api/pc-full/${model}/${mode}?pc=${pc}`);
  if(!resp.ok)return;
  const buf=await resp.arrayBuffer();
  const dv=new DataView(buf);
  _pcFullNL=dv.getUint32(0,true);_pcFullNT=dv.getUint32(4,true);
  const u16=new Uint16Array(buf,12);
  const f32=new Float32Array(u16.length);
  for(let j=0;j<u16.length;j++)f32[j]=f16(u16[j]);
  _pcFull.set(pc,f32);
  console.log('_loadPCFull: PC'+pc+' loaded, '+f32.length+' values, sample:',f32[0],f32[1],f32[2]);
}

async function _loadPCMedium(pcs,step){
  const need=pcs.filter(pc=>!_pcMedium.has(pc)&&!_pcFull.has(pc));
  if(!need.length)return;
  const resp=await fetch(`/api/pc-medium/${model}/${mode}?pcs=${need.join(',')}&step=${step}`);
  if(!resp.ok)return;
  const buf=await resp.arrayBuffer();

function _rayHit(vi,e){const v=views[vi];const r=v.cv.getBoundingClientRect();
  ms.x=((e.clientX-r.left)/r.width)*2-1;ms.y=-((e.clientY-r.top)/r.height)*2+1;

  // sizeAttenuation scales world-unit size by 1/distance in perspective.
  // We want ~6px pick radius regardless of zoom.
  const vpH=r.height||1;const fovRad=v.cam.fov*Math.PI/180;
  const pixelToWorld=2*Math.tan(fovRad/2)/vpH;// world units per pixel at distance 1
  const d=v.cam.position.length()||1;
  const pickRadiusPx=6;// pixels of pick tolerance
  ray.params.Points.threshold=pickRadiusPx*pixelToWorld*d;
  const h=ray.intersectObject(v.pts);
  if(h.length>1){
    // Multiple hits — pick the one closest to the ray (not closest to camera)
    h.sort((a,b)=>a.distanceToRay-b.distanceToRay);
  }
  if(h.length>0)return h[0].index%nN;
  return -1;}

function _disposeScene(sc){
  while(sc.children.length){const c=sc.children[0];sc.remove(c);if(c.geometry)c.geometry.dispose();if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}}}

// Radial neighbor layout: selected pair at center, neighbors in rings
let _brCenterPair=[0,1];// the focused PC pair
let _brCells=[];// [{pa,pb,cx,cy,radius}] — cell positions in the scene

function _brComputeCells(){
  // Build neighborhoods around BOTH vpA pair and vpB pair
  const [aA,aB]=vpPairs[0],[bA,bB]=vpPairs[2];
  const cA=[Math.min(aA,aB),Math.max(aA,aB)];
  const cB=[Math.min(bA,bB),Math.max(bA,bB)];
  _brCells=[];
  const R=5;
  const added=new Set();
  const maxPC=Math.max(nK,_pcsFullK||0,576);
  const addCell=(pa,pb,ring)=>{
    const a=Math.min(pa,pb),b=Math.max(pa,pb);
    if(a<0||b<0||a>=maxPC||b>=maxPC||a===b)return;
    const key=`${a},${b}`;if(added.has(key))return;added.add(key);
    _brCells.push({pa:a,pb:b,ring});
  };
  // Cluster around vpA pair
  addCell(cA[0],cA[1],0);
  for(let r=1;r<=R;r++)for(let d=-r;d<=r;d++)for(let e=-r;e<=r;e++){
    if(Math.max(Math.abs(d),Math.abs(e))!==r)continue;
    addCell(cA[0]+d,cA[1]+e,r);
  }
  // Cluster around vpB pair (overlaps naturally when close)
  addCell(cB[0],cB[1],0);
  for(let r=1;r<=R;r++)for(let d=-r;d<=r;d++)for(let e=-r;e<=r;e++){
    if(Math.max(Math.abs(d),Math.abs(e))!==r)continue;
    addCell(cB[0]+d,cB[1]+e,r);
  }
  // Position ALL cells relative to vpA center (origin)
  _brCells.forEach(c=>{
    const dx=c.pa-cA[0],dy=c.pb-cA[1];
    c.cx=(dy-dx)*_SP*0.8;
    c.cy=-(dy+dx)*_SP*0.8;
    c.rad=c.ring===0?_BR_RAD*1.8:c.ring===1?_BR_RAD*1.2:_BR_RAD*0.8;
  });

  _brPanels[0]._cx=0;_brPanels[0]._cy=0;
  const dxB=cB[0]-cA[0],dyB=cB[1]-cA[1];
  _brPanels[1]._cx=(dyB-dxB)*_SP*0.8;_brPanels[1]._cy=-(dyB+dxB)*_SP*0.8;
}

function buildBrowser(){
  _brBuilt=false;// prevent rendering stale state during rebuild

  const keep=new Set();if(_brHoverBox)keep.add(_brHoverBox);
  while(brSc.children.length){const c=brSc.children[0];brSc.remove(c);if(keep.has(c))continue;if(c.geometry)c.geometry.dispose();if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}}

  keep.forEach(o=>brSc.add(o));

  _brComputeCells();
  _brN=_brCells.length;
  _brWinStart=0;// not used in radial mode
  const nCells=_brCells.length;
  const step=Math.max(1,Math.floor(nN/_BR_PTS));const ptsPerCell=Math.ceil(nN/step);

  for(let l=0;l<nL;l++){
    const pos=new Float32Array(nCells*ptsPerCell*3);

    const origPos=new Float32Array(nCells*ptsPerCell*3);
    const tokMap=new Uint16Array(nCells*ptsPerCell);
    let idx=0;
    _brCells.forEach(c=>{
      const {pa,pb,cx,cy,rad}=c;
      let mx=0;for(let i=0;i<nN;i+=step)mx=Math.max(mx,Math.abs(_getScore(l,i,pa)),Math.abs(_getScore(l,i,pb)));mx=mx||1;

      for(let i=0;i<nN;i+=step){
        const sx=Math.max(-rad,Math.min(rad,_getScore(l,i,pa)/mx*rad));
        const sy=Math.max(-rad,Math.min(rad,_getScore(l,i,pb)/mx*rad));

        origPos[idx*3]=pos[idx*3];origPos[idx*3+1]=pos[idx*3+1];origPos[idx*3+2]=pos[idx*3+2];
        tokMap[idx]=i;
        const hex=CL[scripts[i]]||0xAAAAAA;
        col[idx*3]=((hex>>16)&0xFF)/255;col[idx*3+1]=((hex>>8)&0xFF)/255;col[idx*3+2]=(hex&0xFF)/255;
        idx++;
      }
    });

    geo.setAttribute('color',new THREE.BufferAttribute(col.subarray(0,idx*3),3));

  // Right click (slot 2) only changes vpB → only panel 1 needs to move
  _brFocusPanels(_brFollow===2?1:undefined);
}
function _brFocusPanels(forcePanel){

function _updateBrowserLayer(){
  if(!_brBuilt)return;
  _brLayers.forEach(({pts,layer})=>{
    const d=Math.abs(layer-cL);
    if(d>_BR_VISIBLE_LAYERS){pts.visible=false;return;}
    pts.visible=true;
    pts.material.opacity=d===0?0.7:d===1?0.2:d===2?0.1:d<=3?0.04:0.02;
    pts.material.size=d===0?0.04:0.025;
  });
  // Smoothly track current layer Z on both panels
  _brPanels.forEach(p=>{
    if(!p._inited)return;
    const tz=cL*_ZSP;
    const dz=tz-p.ctl.target.z;
    p.ctl.target.z+=dz;p.cam.position.z+=dz;p.ctl.update();
  });

function _applyBrowserFilter(){
  if(!_brBuilt)return;
  _brLayers.forEach(({pts,origPos,tokMap})=>{
    if(!origPos||!tokMap)return;
    const pos=pts.geometry.attributes.position.array;
    if(!_hiddenScripts.size){pos.set(origPos);}
    else{for(let j=0;j<tokMap.length;j++){
      if(_hiddenScripts.has(scripts[tokMap[j]])){pos[j*3]=9999;pos[j*3+1]=9999;pos[j*3+2]=9999;}
      else{pos[j*3]=origPos[j*3];pos[j*3+1]=origPos[j*3+1];pos[j*3+2]=origPos[j*3+2];}
    }}

// Persistent selection box markers for playback — cheap to update

function _updateBrowserSelBoxes(){

function _updateBrowserOverlay(){
  _brOverlay.forEach(o=>{brSc.remove(o);if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});_brOverlay=[];
  _clearBrowserSelBoxes();_updateBrowserSelBoxes();

function _updateBrowserPinPositions(){

// Cross-highlight: dim all pyramid layers except cells involving a specific PC
let _brHighlightedPC=-1;
function _brHighlightPC(pc){
  if(pc===_brHighlightedPC)return;
  _brHighlightedPC=pc;
  if(!_brBuilt)return;
  const step=Math.max(1,Math.floor(nN/_BR_PTS));
  _brLayers.forEach(({pts})=>{
    if(!pts.visible)return;
    const col=pts.geometry.attributes.color.array;
    let idx=0;
    _brCells.forEach(c=>{
      const involves=c.pa===pc||c.pb===pc;
      for(let i=0;i<nN;i+=step){
        if(idx*3>=col.length)break;
        const dim=involves?1.0:0.08;
        const hex=CL[scripts[i]]||0xAAAAAA;
        col[idx*3]=((hex>>16)&0xFF)/255*dim;
        col[idx*3+1]=((hex>>8)&0xFF)/255*dim;
        col[idx*3+2]=(hex&0xFF)/255*dim;
        idx++;
      }
    });
    pts.geometry.attributes.color.needsUpdate=true;
  });
}
function _brClearHighlight(){
  if(_brHighlightedPC<0)return;
  _brHighlightedPC=-1;
  if(!_brBuilt)return;
  const step=Math.max(1,Math.floor(nN/_BR_PTS));
  _brLayers.forEach(({pts})=>{
    const col=pts.geometry.attributes.color.array;
    let idx=0;
    _brCells.forEach(c=>{
      for(let i=0;i<nN;i+=step){
        if(idx*3>=col.length)break;
        const hex=CL[scripts[i]]||0xAAAAAA;
        col[idx*3]=((hex>>16)&0xFF)/255;
        col[idx*3+1]=((hex>>8)&0xFF)/255;

// Preloaded gate heatmap — [nN × nRealLayers] float16, indexed locally
let _gateHeat=null; // Float32Array, row-major [token][layer]
let _gateNL=0;
async function loadGateHeatmap(){
  try{const resp=await fetch(`/api/gate-heatmap/${model}/${mode}`);if(!resp.ok)return;
    const buf=await resp.arrayBuffer();
    // Parse npy: magic(6)+ver(2)+HEADER_LEN(2)+header_str. Data starts after padding to 64.
    const dv=new DataView(buf);const hLen=dv.getUint16(8,true);
    const off=10+hLen;// npy v1: 6 magic + 2 version + 2 header_len + header_str (already padded to 64)
    const data=new Uint16Array(buf,off);
    const raw=new Float32Array(data.length);
    for(let i=0;i<data.length;i++)raw[i]=f16(data[i]);
    _gateHeat=raw;_gateNL=_nRealLayers;
  }catch(e){_gateHeat=null;}
}
// Local gate lookup — instant, no HTTP
function getGateRow(tokIdx){
  if(!_gateHeat||tokIdx<0)return null;
  const row=new Float32Array(_gateNL);
  for(let l=0;l<_gateNL;l++)row[l]=_gateHeat[tokIdx*_gateNL+l];
  return row;
}

const _WL_NAMES=['Q','K','V','O','gate','up','down'];

function _rebuildWeightLines(){

  const key=`${vpPairs[0]},${vpPairs[1]},${vpPairs[2]}`;
  const needsRebuild=key!==_wlBuiltKey;

function _rebuildInternals(vi,pair,needsRebuild){
  const lv=leftViews[vi];if(!lv)return;
  const nMat=_wlData[0]?.matrices?.length||0;if(!nMat)return;
  const pcA=pair[0],pcB=pair[1];
  const zSpan=3.0;

  // --- Layer dots: 7 bright dots at current layer position ---
  if(!lv._layerDots){
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(nMat*3),3));
    g.setAttribute('color',new THREE.BufferAttribute(new Float32Array(nMat*3),3));
    lv._layerDots=new THREE.Points(g,new THREE.PointsMaterial({size:5,vertexColors:true,sizeAttenuation:false,transparent:true,opacity:0.95,depthWrite:false,depthTest:false}));
    lv._layerDots.renderOrder=10;lv._layerDots.frustumCulled=false;lv.sc.add(lv._layerDots);
  }
  // Position dots at current layer
  const dPos=lv._layerDots.geometry.attributes.position.array;
  const dCol=lv._layerDots.geometry.attributes.color.array;
  for(let mi=0;mi<nMat;mi++){
    const al=_wlData[cL]?.matrices?.[mi]?.alignment||[];
    const x=(al[pcA]||0)*2-1;// alignment 0..1 → -1..1
    const y=(al[pcB]||0)*2-1;
    const z=(cL/(_nRealLayers-1))*zSpan-zSpan/2;
    dPos[mi*3]=x;dPos[mi*3+1]=y;dPos[mi*3+2]=z;
    const hex=_WL_COLORS[mi];
    dCol[mi*3]=((hex>>16)&0xFF)/255;dCol[mi*3+1]=((hex>>8)&0xFF)/255;dCol[mi*3+2]=(hex&0xFF)/255;
  }
  lv._layerDots.geometry.attributes.position.needsUpdate=true;
  lv._layerDots.geometry.attributes.color.needsUpdate=true;
  lv._layerDots.geometry.setDrawRange(0,nMat);

  if(!needsRebuild)return;

  // --- Clear old geometry ---
  if(lv._wlTrajs){lv._wlTrajs.forEach(t=>{lv.sc.remove(t);t.geometry.dispose();t.material.dispose();});lv._wlTrajs=null;}
  if(lv._grid){lv.sc.remove(lv._grid);lv._grid.geometry?.dispose();lv._grid.material?.dispose();lv._grid=null;}
  if(lv._gateLineA){lv.sc.remove(lv._gateLineA);lv._gateLineA.geometry.dispose();lv._gateLineA.material.dispose();lv._gateLineA=null;}
  if(lv._gateLineB){lv.sc.remove(lv._gateLineB);lv._gateLineB.geometry.dispose();lv._gateLineB.material.dispose();lv._gateLineB=null;}
  if(lv._attnLines){lv._attnLines.forEach(l=>{lv.sc.remove(l);l.geometry.dispose();l.material.dispose();});lv._attnLines=null;}

  // --- Build 7 trajectories: X=align(pcA), Y=align(pcB), Z=layer ---
  lv._wlTrajs=[];
  for(let mi=0;mi<nMat;mi++){
    const pts=[];
    for(let l=0;l<_nRealLayers;l++){
      const al=_wlData[l]?.matrices?.[mi]?.alignment||[];
      const x=(al[pcA]||0)*2-1;
      const y=(al[pcB]||0)*2-1;
      const z=(l/(_nRealLayers-1))*zSpan-zSpan/2;
      pts.push(new THREE.Vector3(x,y,z));
    }
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:_WL_COLORS[mi],transparent:true,opacity:0.35}));
    line.frustumCulled=false;lv.sc.add(line);lv._wlTrajs.push(line);
  }

  // Label
  const lbl=document.getElementById('lv'+vi+'i');
  if(lbl)lbl.textContent=vi===0?`A: PC${pcA}×PC${pcB}`:vi===1?`Δ: PC${pcA}×PC${pcB}`:` B: PC${pcA}×PC${pcB}`;
  if(!lv._camSet){lv.cam.position.set(1.5,1.2,zSpan*0.8);lv.ctl.target.set(0,0,0);lv.ctl.update();lv._camSet=true;}
  lv._wlLines=true;

  // --- Interactive legend ---
  let leg=lv.el.querySelector('.wl-legend');
  if(!leg){
    leg=document.createElement('div');leg.className='wl-legend';
    leg.style.cssText='position:absolute;bottom:2px;left:2px;z-index:2;display:flex;gap:3px;flex-wrap:wrap;pointer-events:auto';
    lv.el.style.position='relative';
    lv.el.appendChild(leg);
  }
  while(leg.firstChild)leg.removeChild(leg.firstChild);
  const hexStr=h=>'#'+h.toString(16).padStart(6,'0');
  for(let mi=0;mi<nMat;mi++){
    const btn=document.createElement('span');
    btn.style.cssText=`font-size:7px;color:${hexStr(_WL_COLORS[mi])};cursor:pointer;padding:1px 2px;border:1px solid #222;border-radius:2px;opacity:0.8;user-select:none`;
    btn.textContent=_WL_NAMES[mi];
    btn.dataset.mi=mi;
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const sel=parseInt(btn.dataset.mi);
      const wasIsolated=lv._wlIsolated===sel;
      lv._wlIsolated=wasIsolated?-1:sel;
      lv._wlTrajs.forEach((t,i)=>{
        if(lv._wlIsolated<0){t.material.opacity=0.35;t.visible=true;}
        else{t.material.opacity=i===lv._wlIsolated?0.9:0.06;t.visible=true;}
      });
      const dPos=lv._layerDots.geometry.attributes.position.array;
      for(let i=0;i<nMat;i++){
        if(lv._wlIsolated>=0&&i!==lv._wlIsolated){dPos[i*3]=9999;dPos[i*3+1]=9999;dPos[i*3+2]=9999;}
        else{const al=_wlData[cL]?.matrices?.[i]?.alignment||[];dPos[i*3]=(al[pcA]||0)*2-1;dPos[i*3+1]=(al[pcB]||0)*2-1;dPos[i*3+2]=(cL/(_nRealLayers-1))*zSpan-zSpan/2;}
      }
      lv._layerDots.geometry.attributes.position.needsUpdate=true;
      leg.querySelectorAll('span').forEach((s,i)=>{s.style.opacity=lv._wlIsolated<0||i===lv._wlIsolated?'0.9':'0.3';});
      _markDirty();
    });
    leg.appendChild(btn);
  }
  lv._wlIsolated=-1;
}

// --- Neuron activation charts (2D canvas) ---
function renderNeuronChart(tok,canvasId,rgb){
  const cv=document.getElementById(canvasId);if(!cv)return;
  if(tok<0||!_gateHeat){cv.style.display='none';return;}
  const row=getGateRow(tok);if(!row){cv.style.display='none';return;}
  cv.style.display='block';
  const w=cv.parentElement.clientWidth||200,h=40;
  cv.width=w*2;cv.height=h*2;// 2x for retina
  const ctx=cv.getContext('2d');ctx.scale(2,2);ctx.clearRect(0,0,w,h);
  const mx=Math.max(...row)||1;const bw=w/_nRealLayers;
  // Area fill
  ctx.beginPath();ctx.moveTo(0,h);
  for(let l=0;l<_nRealLayers;l++){const v=row[l]/mx;ctx.lineTo(l*bw+bw/2,h-v*(h-2));}
  ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle=`rgba(${rgb},0.15)`;ctx.fill();
  // Line
  ctx.beginPath();
  for(let l=0;l<_nRealLayers;l++){const v=row[l]/mx;const x=l*bw+bw/2,y=h-v*(h-2);l===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.strokeStyle=`rgba(${rgb},0.7)`;ctx.lineWidth=1;ctx.stroke();
  // Current layer marker
  const cx=cL*bw+bw/2;ctx.fillStyle=`rgba(${rgb},0.9)`;ctx.fillRect(cx-1,0,2,h);
  // Peak marker
  let peakL=0;for(let l=1;l<_nRealLayers;l++)if(row[l]>row[peakL])peakL=l;
  const px=peakL*bw+bw/2,py=h-(row[peakL]/mx)*(h-2);
  ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fillStyle=`rgb(${rgb})`;ctx.fill();
  // Label
  ctx.font='7px monospace';ctx.fillStyle=`rgba(${rgb},0.6)`;
  ctx.fillText(`peak L${peakL}`,2,8);ctx.fillText(`${row[cL].toFixed(1)}`,w-30,8);
}

// Gate activity lines in weights viewport — continuous trajectory of MLP activation
function _updateGateLines(lv){
  if(!lv)return;
  // Dispose old gate lines
  if(lv._gateLineA){lv.sc.remove(lv._gateLineA);lv._gateLineA.geometry.dispose();lv._gateLineA.material.dispose();lv._gateLineA=null;}
  if(lv._gateLineB){lv.sc.remove(lv._gateLineB);lv._gateLineB.geometry.dispose();lv._gateLineB.material.dispose();lv._gateLineB=null;}
  if(!_gateHeat)return;
  // Token A gate line
  if(pinnedToken>=0){const row=getGateRow(pinnedToken);if(row){const mx=Math.max(...row)||1;
    const pts=[];for(let l=0;l<_nRealLayers;l++)pts.push(new THREE.Vector3(1.5,(row[l]/mx)*1.5,(l/(_nRealLayers-1))*2-1));
    lv._gateLineA=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xFF6644,transparent:true,opacity:0.8}));
    lv._gateLineA.frustumCulled=false;lv.sc.add(lv._gateLineA);}}
  // Token B gate line
  if(pinnedTokenB>=0){const row=getGateRow(pinnedTokenB);if(row){const mx=Math.max(...row)||1;
    const pts=[];for(let l=0;l<_nRealLayers;l++)pts.push(new THREE.Vector3(1.7,(row[l]/mx)*1.5,(l/(_nRealLayers-1))*2-1));
    lv._gateLineB=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x4477AA,transparent:true,opacity:0.8}));
    lv._gateLineB.frustumCulled=false;lv.sc.add(lv._gateLineB);}}
}
// Attention pattern in weights viewport — for template mode pinned token
function _updateAttnInWeights(lv){
  if(!lv)return;
  if(lv._attnLines){lv._attnLines.forEach(l=>{lv.sc.remove(l);l.geometry.dispose();l.material.dispose();});lv._attnLines=null;}
  if(!_attnData||pinnedToken<0||mode!=='template')return;
  lv._attnLines=[];
  // Show self-attention fraction per layer as a line at X=-1.5
  const pts=[];
  for(let l=0;l<Math.min(_attnData.length,_nRealLayers);l++){
    const heads=_attnData[l]?.heads;if(!heads||!heads.length){pts.push(new THREE.Vector3(-1.5,0,(l/(_nRealLayers-1))*2-1));continue;}
    // Average self-attention across heads (last position = self)
    let selfAttn=0;heads.forEach(h=>{selfAttn+=h[h.length-1]||0;});selfAttn/=heads.length;
    pts.push(new THREE.Vector3(-1.5,selfAttn*1.5,(l/(_nRealLayers-1))*2-1));
  }
  if(pts.length>1){
    const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x88FFAA,transparent:true,opacity:0.6}));
    line.frustumCulled=false;lv.sc.add(line);lv._attnLines.push(line);
  }
}

// rv0: Variance spectrum — X=PC, Y=log(variance), Z=layer
function _buildRV0Variance(){
  const rv=rightViews[0];if(!rv||!_layerVar.length)return;
  _clearRV(rv);
  const nPC=Math.min(nK,20);rv._rvSlices=[];
  // Use log scale so small PCs are visible alongside dominant ones
  const logV=(v)=>v>0?Math.log10(v*1000+1)/3:0;// maps 0.001->0.3, 0.1->0.7, 1.0->1.0
  for(let l=0;l<_nRealLayers;l++){
    const z=(l/(_nRealLayers-1))*2-1;
    const pos=[];const cols=[];
    for(let pc=0;pc<nPC;pc++){
      const v=_layerVar[l]?_layerVar[l][pc]||0:0;
      const x=(pc/(nPC-1||1))*2-1;
      const h=logV(v)*1.5;
      pos.push(x,0,z, x,h,z);
      const hue=pc/nPC;const c=new THREE.Color().setHSL(hue,0.8,0.5);
      cols.push(c.r*0.3,c.g*0.3,c.b*0.3, c.r,c.g,c.b);// dark base, bright top
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pos),3));
    geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(cols),3));
    const seg=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.15}));
    seg.frustumCulled=false;rv.sc.add(seg);rv._rvSlices.push({mesh:seg,layer:l});
  }
  rv.cam.position.set(1.5,1.5,2);rv.ctl.target.set(0,0.5,0);rv.ctl.update();rv.built=true;
  _updateRVLayer();
}

// rv1: Neuron field — current slice dots + persistence trails
// Dots: current layer only, colored A(orange)/B(blue)/shared(white)
// Trails: lines connecting same neuron across layers where it's active
// All data pre-loaded — layer change is instant (no fetches)
let _nfMesh=null;    // Points — current slice dots
let _nfTrails=null;  // LineSegments — persistence trails
let _nfMat=null;
let _nfHoverMesh=null;// Points — hover token neurons (white)
let _nfInter=0;
let _nfCols=0,_nfRows=0;
let _nfActA=null,_nfActB=null;
let _nfLoadingA=-1,_nfLoadingB=-1;
let _nfBaseXY=null;  // Float32Array [inter*2] — x,y per neuron (shared across layers)
let _nfZPerLayer=null;// Float32Array [nLayers] — z position per layer
let _nfLayerMax=null; // Float32Array [nLayers] — per-layer max activation
const _NF_THRESH=0.02;

function _nfNeuronXY(n){
  return [_nfBaseXY[n*2], _nfBaseXY[n*2+1]];
}

function _buildRV1Neurons(){
  const rv=rightViews[1];if(!rv)return;
  _nfInter=dm?.intermediate_size||0;
  if(!_nfInter||!_nRealLayers){rv.built=true;return;}
  _nfCols=Math.ceil(Math.sqrt(_nfInter*1.5));
  _nfRows=Math.ceil(_nfInter/_nfCols);
  // Build per-neuron XY positions (constant across layers)
  _nfBaseXY=new Float32Array(_nfInter*2);
  const xSpan=2.4, ySpan=2.4, zSpan=3.0;
  for(let n=0;n<_nfInter;n++){
    const c=n%_nfCols, r=Math.floor(n/_nfCols);
    const hexOff=(r&1)?0.5/_nfCols*xSpan:0;
    const h=((n*2654435761)>>>0)/4294967296;
    const jx=(h-0.5)*0.02, jy=(((n*1597334677)>>>0)/4294967296-0.5)*0.02;
    _nfBaseXY[n*2]=(c/(_nfCols-1))*xSpan-xSpan/2+hexOff+jx;
    _nfBaseXY[n*2+1]=(r/(_nfRows-1))*ySpan-ySpan/2+jy;
  }
  // Build per-layer Z positions
  _nfZPerLayer=new Float32Array(_nRealLayers);
  for(let l=0;l<_nRealLayers;l++)_nfZPerLayer[l]=(l/(_nRealLayers-1))*zSpan-zSpan/2;
  // Clear old scene
  _nfDispose();
  _clearRV(rv);rv._rvSlices=[];
  if(rv.sc.children[0])rv.sc.children[0].visible=false;
  // Dots: allocate max size (one layer's worth of neurons)
  const dotPos=new Float32Array(_nfInter*3);
  const dotCol=new Float32Array(_nfInter*3);
  const dotGeo=new THREE.BufferGeometry();
  dotGeo.setAttribute('position',new THREE.BufferAttribute(dotPos,3));
  dotGeo.setAttribute('color',new THREE.BufferAttribute(dotCol,3));
  dotGeo.setDrawRange(0,0);
  _nfMat=new THREE.PointsMaterial({size:3,vertexColors:true,sizeAttenuation:false,transparent:true,opacity:0.95,depthWrite:false});
  _nfMesh=new THREE.Points(dotGeo,_nfMat);
  _nfMesh.frustumCulled=false;
  rv.sc.add(_nfMesh);
  // Hover mesh: white dots for hovered token's neurons
  const hDotPos=new Float32Array(_nfInter*3);
  const hDotGeo=new THREE.BufferGeometry();
  hDotGeo.setAttribute('position',new THREE.BufferAttribute(hDotPos,3));
  hDotGeo.setDrawRange(0,0);
  _nfHoverMesh=new THREE.Points(hDotGeo,new THREE.PointsMaterial({size:2.5,color:0xFFFFFF,sizeAttenuation:false,transparent:true,opacity:0.6,depthWrite:false}));
  _nfHoverMesh.frustumCulled=false;_nfHoverMesh.renderOrder=5;
  rv.sc.add(_nfHoverMesh);
  window._dbgNF={mesh:_nfMesh,rv,get trails(){return _nfTrails},get actA(){return _nfActA},get actB(){return _nfActB}};
  if(!rv._camSet){rv.cam.position.set(2.0,1.8,2.5);rv.ctl.target.set(0,0,-0.3);rv.ctl.update();rv._camSet=true;}
  rv.built=true;
  _nfActA=null;_nfActB=null;_nfLoadingA=-1;_nfLoadingB=-1;
  _nfUpdateActivations();_markDirty();
}

function _nfDispose(){
  if(_nfMesh){_nfMesh.geometry.dispose();_nfMat?.dispose();_nfMesh=null;_nfMat=null;}
  if(_nfTrails){_nfTrails.geometry.dispose();_nfTrails.material.dispose();_nfTrails=null;}
}

// Compute per-neuron color from A/B activations (normalized)
// A-only → orange, B-only → blue, both → proportional blend (no white wash)
function _nfColor(va, vb){
  const activity=Math.max(va,vb);
  if(activity<0.01)return [0,0,0];
  const bright=0.4+0.6*Math.min(activity,1);
  // Only one token loaded → pure color
  if(!_nfActB){return [1.0*bright, 0.4*bright, 0.15*bright];}// orange
  if(!_nfActA){return [0.25*bright, 0.5*bright, 1.0*bright];}// blue
  // Both loaded: A-only → orange, B-only → blue, both → blend by dominance
  const aOn=va>=_NF_THRESH, bOn=vb>=_NF_THRESH;
  if(aOn&&!bOn)return [1.0*bright, 0.4*bright, 0.15*bright];// orange
  if(bOn&&!aOn)return [0.25*bright, 0.5*bright, 1.0*bright];// blue
  // Both active: blend by relative strength, no whitening
  const t=vb/(va+vb+0.001);
  return [(1.0-t*0.75)*bright, (0.4+t*0.1)*bright, (0.15+t*0.85)*bright];
}

// Rebuild current-layer dots — instant, reads from pre-loaded arrays
function _nfBuildDots(){
  if(!_nfMesh||!_nfBaseXY)return;
  const pos=_nfMesh.geometry.getAttribute('position');
  const col=_nfMesh.geometry.getAttribute('color');
  const lm=_nfLayerMax?_nfLayerMax[cL]||1:1;
  const z=_nfZPerLayer?_nfZPerLayer[cL]:0;
  let di=0;
  for(let n=0;n<_nfInter;n++){
    const idx=cL*_nfInter+n;
    const va=_nfActA?Math.abs(_nfActA[idx])/lm:0;
    const vb=_nfActB?Math.abs(_nfActB[idx])/lm:0;
    if(Math.max(va,vb)<_NF_THRESH)continue;
    pos.array[di*3]=_nfBaseXY[n*2];
    pos.array[di*3+1]=_nfBaseXY[n*2+1];
    pos.array[di*3+2]=z;
    const [r,g,b]=_nfColor(va,vb);
    col.array[di*3]=r;col.array[di*3+1]=g;col.array[di*3+2]=b;
    di++;
  }
  _nfMesh.geometry.setDrawRange(0,di);
  pos.needsUpdate=true;col.needsUpdate=true;_markDirty();
}

// Build persistence trails — pre-allocated buffer, updated in place
function _nfBuildTrails(){
  const rv=rightViews[1];if(!rv||!_nfBaseXY||!_nfZPerLayer)return;
  if(!_nfActA&&!_nfActB){
    if(_nfTrails)_nfTrails.geometry.setDrawRange(0,0);
    return;
  }
  // Compute per-layer max
  _nfLayerMax=new Float32Array(_nRealLayers);
  for(let l=0;l<_nRealLayers;l++){
    let mx=0;
    for(let n=0;n<_nfInter;n++){
      const idx=l*_nfInter+n;
      const va=_nfActA?Math.abs(_nfActA[idx]):0;
      const vb=_nfActB?Math.abs(_nfActB[idx]):0;
      if(va>mx)mx=va;if(vb>mx)mx=vb;
    }
    _nfLayerMax[l]=mx||1;
  }
  // Pre-allocate trail buffer (max possible: every neuron active at every pair of adjacent layers)
  const maxSegs=_nfInter*(_nRealLayers-1);// worst case
  if(!_nfTrails){
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(maxSegs*6),3));
    geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(maxSegs*6),3));
    geo.setDrawRange(0,0);
    _nfTrails=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.25,depthWrite:false}));
    _nfTrails.frustumCulled=false;
    rv.sc.add(_nfTrails);
  }
  const tPos=_nfTrails.geometry.attributes.position.array;
  const tCol=_nfTrails.geometry.attributes.color.array;
  let si=0;// segment index (each seg = 2 vertices = 6 floats)
  for(let n=0;n<_nfInter;n++){
    const x=_nfBaseXY[n*2], y=_nfBaseXY[n*2+1];
    let prevActive=false, prevZ=0, prevR=0, prevG=0, prevB=0;
    for(let l=0;l<_nRealLayers;l++){
      const idx=l*_nfInter+n;
      const lm=_nfLayerMax[l];
      const va=_nfActA?Math.abs(_nfActA[idx])/lm:0;
      const vb=_nfActB?Math.abs(_nfActB[idx])/lm:0;
      const active=Math.max(va,vb)>=_NF_THRESH;
      if(active&&prevActive&&si<maxSegs){
        const [r,g,b]=_nfColor(va,vb);
        const o=si*6;
        tPos[o]=x;tPos[o+1]=y;tPos[o+2]=prevZ;
        tPos[o+3]=x;tPos[o+4]=y;tPos[o+5]=_nfZPerLayer[l];
        tCol[o]=prevR;tCol[o+1]=prevG;tCol[o+2]=prevB;
        tCol[o+3]=r;tCol[o+4]=g;tCol[o+5]=b;
        si++;
      }
      if(active){
        const [r,g,b]=_nfColor(va,vb);
        prevActive=true;prevZ=_nfZPerLayer[l];prevR=r;prevG=g;prevB=b;
      }else{prevActive=false;}
    }
  }
  _nfTrails.geometry.setDrawRange(0,si*2);
  _nfTrails.geometry.attributes.position.needsUpdate=true;
  _nfTrails.geometry.attributes.color.needsUpdate=true;
  _markDirty();
}

// Cache: token_idx → Float32Array
const _nfCache=new Map();

async function _nfLoadToken(tokIdx, slot){
  if(tokIdx<0){
    if(slot==='A'){_nfActA=null;_nfLoadingA=-1;}else{_nfActB=null;_nfLoadingB=-1;}
    _nfBuildDots();_nfDeferTrails();return;
  }
  if(slot==='A'&&_nfLoadingA===tokIdx)return;
  if(slot==='B'&&_nfLoadingB===tokIdx)return;
  if(slot==='A')_nfLoadingA=tokIdx;else _nfLoadingB=tokIdx;
  const cacheKey=`${model}/${mode}/${tokIdx}`;
  // Full cache hit → instant dots + trails
  if(_nfCache.has(cacheKey)){
    if(slot==='A')_nfActA=_nfCache.get(cacheKey);else _nfActB=_nfCache.get(cacheKey);
    if(slot==='A')_nfLoadingA=-1;else _nfLoadingB=-1;
    _nfBuildDots();_nfDeferTrails();return;
  }
  // Hover cache hit → instant dots from single-layer data, fetch full for trails
  const hoverEntry=_hoverCache.get(`${tokIdx},${cL}`);
  if(hoverEntry&&hoverEntry.neurons&&_nfInter){
    // Build temporary full array with just current layer populated
    const tmp=new Float32Array(_nRealLayers*_nfInter);
    for(let n=0;n<Math.min(hoverEntry.neurons.length,_nfInter);n++)tmp[cL*_nfInter+n]=hoverEntry.neurons[n];
    if(slot==='A')_nfActA=tmp;else _nfActB=tmp;
    _nfBuildDots();// instant dots from hover data
  }
  // Fetch full data (all layers) for trails — replaces temp array
  try{
    const resp=await fetch(`/api/neuron-field/${model}/${mode}?token=${tokIdx}`);
    if(!resp.ok)return;
    const ct=resp.headers.get('content-type')||'';
    if(ct.includes('json'))return;
    const buf=await resp.arrayBuffer();
    const u16=new Uint16Array(buf);
    const f32=new Float32Array(u16.length);
    for(let i=0;i<u16.length;i++)f32[i]=f16(u16[i]);
    _nfCache.set(cacheKey,f32);
    if(slot==='A')_nfActA=f32;else _nfActB=f32;
    _nfBuildDots();_nfDeferTrails();
  }catch(e){console.error('neuron-field:',e);
  }finally{if(slot==='A')_nfLoadingA=-1;else _nfLoadingB=-1;}
}

// Build trails in idle callback so dots appear instantly
let _nfTrailTimer=0;
function _nfDeferTrails(){
  cancelAnimationFrame(_nfTrailTimer);
  _nfTrailTimer=requestAnimationFrame(()=>_nfBuildTrails());
}

function _nfUpdateActivations(){
  _nfLoadToken(pinnedToken,'A');
  _nfLoadToken(pinnedTokenB,'B');
}
// Show hover token's neurons as white dots at current layer
function _nfShowHover(neurons){
  if(!_nfHoverMesh||!_nfBaseXY)return;
  if(!neurons){_nfHoverMesh.geometry.setDrawRange(0,0);_markDirty();return;}
  const pos=_nfHoverMesh.geometry.attributes.position.array;
  const z=_nfZPerLayer?_nfZPerLayer[cL]||0:0;
  let mx=0.001;for(let i=0;i<neurons.length;i++)mx=Math.max(mx,Math.abs(neurons[i]));
  let cnt=0;
  for(let n=0;n<Math.min(neurons.length,_nfInter);n++){
    const v=Math.abs(neurons[n])/mx;
    if(v<_NF_THRESH)continue;
    pos[cnt*3]=_nfBaseXY[n*2];
    pos[cnt*3+1]=_nfBaseXY[n*2+1];
    pos[cnt*3+2]=z;
    cnt++;
  }
  _nfHoverMesh.geometry.setDrawRange(0,cnt);
  _nfHoverMesh.geometry.attributes.position.needsUpdate=true;
  _markDirty();
}

function _initPCSScene(){

  _pcsHoverMesh.frustumCulled=false;_pcsHoverMesh.renderOrder=5;_pcsSc.add(_pcsHoverMesh);
  // Click: select PC for viewport A (left-click=PC1, shift-click=PC2)

    const sB=_pcsFullB&&pinnedTokenB>=0?_pcsFullB[cL*fK+pc]:pinnedTokenB>=0?_getScore(cL,pinnedTokenB,pc):null;

    if(!_pcsNK||!allL?.length)return;

function _pcsHitTest(e){
  if(!_pcsDotsA&&!_pcsDotsB)return -1;
  const dots=_pcsDotsA||_pcsDotsB;if(!dots)return -1;
  const rect=_pcsEl.getBoundingClientRect();
  if(rect.width<1||rect.height<1)return -1;
  const mx=((e.clientX-rect.left)/rect.width)*2-1;
  const my=-((e.clientY-rect.top)/rect.height)*2+1;
  const pos=dots.geometry.attributes.position;
  let best=-1,bestD=Infinity;
  const v=new THREE.Vector3();
  // Tighter threshold: 0.005 in NDC (roughly 5px on a 500px viewport)
  for(let i=0;i<_pcsNK;i++){
    v.set(pos.getX(i),pos.getY(i),pos.getZ(i));
    v.project(_pcsCam);
    if(v.z<-1||v.z>1)continue;// behind camera or beyond far plane
    const dx=v.x-mx,dy=v.y-my;
    const d=dx*dx+dy*dy;
    if(d<bestD&&d<0.005){bestD=d;best=i;}
  }
  return best;
}

// Unified per-token PCA fetch — shared by pin and hover
async function _pcsFetchToken(tokIdx){
  if(tokIdx<0||!model)return null;
  const cached=_pcsHoverCache.get(tokIdx);
  if(cached)return cached;
  const resp=await fetch(`/api/token-pca/${model}/${mode}?token=${tokIdx}`);
  if(!resp.ok)return null;
  const ct=resp.headers.get('content-type')||'';if(ct.includes('json'))return null;
  const buf=await resp.arrayBuffer();
  const dv=new DataView(buf);
  const entry={nL:dv.getUint32(0,true),fK:dv.getUint32(4,true),data:new Float32Array(buf,8)};
  if(_pcsHoverCache.size>64){const first=_pcsHoverCache.keys().next().value;_pcsHoverCache.delete(first);}
  _pcsHoverCache.set(tokIdx,entry);
  return entry;
}
async function _pcsLoadFull(tokIdx, slot){
  if(tokIdx<0){
    if(slot==='A'){_pcsFullA=null;_pcsLoadingA=-1;}else{_pcsFullB=null;_pcsLoadingB=-1;}
    return;
  }
  if(slot==='A'&&_pcsLoadingA===tokIdx)return;
  if(slot==='B'&&_pcsLoadingB===tokIdx)return;
  if(slot==='A')_pcsLoadingA=tokIdx;else _pcsLoadingB=tokIdx;
  try{
    const entry=await _pcsFetchToken(tokIdx);
    if(!entry)return;
    _pcsFullNL=entry.nL;_pcsFullK=entry.fK;
    if(slot==='A')_pcsFullA=entry.data;else _pcsFullB=entry.data;
  }catch(e){console.error('token-pca:',e);
  }finally{if(slot==='A')_pcsLoadingA=-1;else _pcsLoadingB=-1;}
}

function _buildPCSSpectrum(){
  if(!_pcsSc)_initPCSScene();
  if(!_pcsSc||!_nRealLayers)return;
  // Use full PCA data if available, fall back to allL
  const hasFullData=_pcsFullA||_pcsFullB;
  _pcsNK=hasFullData?_pcsFullK:nK;
  const zSpan=3.0, xSpan=2.4;
  // Per-token Y scale — each token normalized independently so pinning one doesn't shift the other
  const nL_pcs=_pcsFullNL||_nRealLayers;
  function _tokenScale(fd){
    if(!fd)return 0;
    let mx=0.001;for(let i=0;i<fd.length;i++)if(Math.abs(fd[i])>mx)mx=Math.abs(fd[i]);
    return 1.2/mx;
  }
  const _scaleA=_tokenScale(_pcsFullA);
  const _scaleB=_tokenScale(_pcsFullB);
  _pcsScale=_scaleA||_scaleB||0;// expose best available for hover
  const maxPts=nL_pcs*_pcsNK;

  // Dispose old meshes if size changed (nK changed between models/loads)
  if(_pcsMeshA&&_pcsMeshA.geometry.attributes.position.count<maxPts){
    [_pcsMeshA,_pcsMeshB,_pcsDotsA,_pcsDotsB].forEach(m=>{if(m){_pcsSc.remove(m);m.geometry.dispose();m.material.dispose();}});
    _pcsMeshA=_pcsMeshB=_pcsDotsA=_pcsDotsB=null;
  }

  function _ensureSpec(mesh,dots,colHex){
    if(!mesh){
      const tGeo=new THREE.BufferGeometry();
      tGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(maxPts*3),3));
      tGeo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(maxPts*3),3));
      tGeo.setDrawRange(0,0);
      mesh=new THREE.Points(tGeo,new THREE.PointsMaterial({size:1.5,vertexColors:true,sizeAttenuation:false,transparent:true,opacity:0.8,depthWrite:false}));
      mesh.frustumCulled=false;_pcsSc.add(mesh);
    }
    if(!dots){
      const dGeo=new THREE.BufferGeometry();
      dGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(_pcsNK*3),3));
      dGeo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(_pcsNK*3),3));
      dots=new THREE.Points(dGeo,new THREE.PointsMaterial({size:3,vertexColors:true,sizeAttenuation:false,transparent:true,opacity:0.95,depthWrite:false}));
      dots.frustumCulled=false;dots.renderOrder=10;_pcsSc.add(dots);
    }
    return [mesh,dots];
  }

  function _fillSpec(mesh,dots,fullData,tok,colHex,scale){
    const cr=((colHex>>16)&0xFF)/255, cg=((colHex>>8)&0xFF)/255, cb=(colHex&0xFF)/255;
    const tPos=mesh.geometry.attributes.position.array;
    const tCol=mesh.geometry.attributes.color.array;
    if(tok<0||!fullData||!scale){mesh.geometry.setDrawRange(0,0);dots.geometry.setDrawRange(0,0);return;}
    const fK=_pcsFullK||_pcsNK;
    for(let l=0;l<nL_pcs;l++){
      const z=(l/(nL_pcs-1))*zSpan-zSpan/2;
      for(let pc=0;pc<_pcsNK;pc++){
        const i=l*_pcsNK+pc;
        if(i*3+2>=tPos.length)break;
        tPos[i*3]=(pc/(_pcsNK-1||1))*xSpan-xSpan/2;
        const val=fullData[l*fK+pc]||0;
        tPos[i*3+1]=val*scale;
        tPos[i*3+2]=z;
        tCol[i*3]=cr*0.1;tCol[i*3+1]=cg*0.1;tCol[i*3+2]=cb*0.1;
      }
    }
    mesh.geometry.setDrawRange(0,Math.min(maxPts,nL_pcs*_pcsNK));
    mesh.geometry.attributes.position.needsUpdate=true;
    mesh.geometry.attributes.color.needsUpdate=true;
    dots.geometry.setDrawRange(0,_pcsNK);
  }

  [_pcsMeshA,_pcsDotsA]=_ensureSpec(_pcsMeshA,_pcsDotsA,0xFF6644);
  [_pcsMeshB,_pcsDotsB]=_ensureSpec(_pcsMeshB,_pcsDotsB,0x4477AA);
  _fillSpec(_pcsMeshA,_pcsDotsA,_pcsFullA,pinnedToken,0xFF6644,_scaleA);
  _fillSpec(_pcsMeshB,_pcsDotsB,_pcsFullB,pinnedTokenB,0x4477AA,_scaleB);
  // --- Navigational scaffolding ---

  // 1. Variance envelope — line showing variance decay across PCs
  if(_pcsVarLine){_pcsSc.remove(_pcsVarLine);_pcsVarLine.geometry.dispose();_pcsVarLine.material.dispose();_pcsVarLine=null;}
  if(_layerVar[cL]){
    const vPts=[];
    for(let pc=0;pc<_pcsNK;pc++){
      const x=(pc/(_pcsNK-1||1))*xSpan-xSpan/2;
      const v=_layerVar[cL]?.[pc]||0;
      vPts.push(new THREE.Vector3(x,Math.sqrt(v)*3,0));// sqrt for visual compression
    }
    if(vPts.length>1){
      const g=new THREE.BufferGeometry().setFromPoints(vPts);
      _pcsVarLine=new THREE.Line(g,new THREE.LineBasicMaterial({color:0x333333,transparent:true,opacity:0.5}));
      _pcsVarLine.frustumCulled=false;_pcsSc.add(_pcsVarLine);
    }
  }

  // 2. PC index ticks — vertical marks at round PC numbers
  if(_pcsTicks){_pcsTicks.forEach(t=>{_pcsSc.remove(t);t.geometry.dispose();t.material.dispose();});}_pcsTicks=[];
  const tickInterval=_pcsNK>200?100:_pcsNK>50?25:10;
  for(let pc=0;pc<_pcsNK;pc+=tickInterval){
    const x=(pc/(_pcsNK-1||1))*xSpan-xSpan/2;
    const pts=[new THREE.Vector3(x,-0.02,-zSpan/2),new THREE.Vector3(x,0.02,-zSpan/2)];
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:0x555555}));
    l.frustumCulled=false;_pcsSc.add(l);_pcsTicks.push(l);
  }

  // 4. Layer-colored background: color trail points by depth
  [_pcsMeshA,_pcsMeshB].forEach((mesh,mi)=>{
    if(!mesh)return;
    const col=mesh.geometry.attributes.color.array;
    const baseHex=mi===0?0xFF6644:0x4477AA;
    const cr=((baseHex>>16)&0xFF)/255,cg=((baseHex>>8)&0xFF)/255,cb=(baseHex&0xFF)/255;
    for(let l=0;l<nL_pcs;l++){
      const lFrac=l/(nL_pcs-1||1);// 0=first layer, 1=last
      const bright=0.04+lFrac*0.12;// deeper layers slightly brighter
      for(let pc=0;pc<_pcsNK;pc++){
        const i=l*_pcsNK+pc;if(i*3+2>=col.length)break;
        col[i*3]=cr*bright;col[i*3+1]=cg*bright;col[i*3+2]=cb*bright;
      }
    }
    mesh.geometry.attributes.color.needsUpdate=true;
  });

  _updatePCSDots();
  const lbl=document.getElementById('pcsLabel');
  if(lbl)lbl.textContent=`PC Spectrum · ${_pcsNK} PCs · click=set A, shift=set B`;
  _markDirty();
}

function _updatePCSDots(){
  if(!_pcsNK)return;
  const xSpan=2.4, zSpan=3.0;
  const nL_pcs=_pcsFullNL||_nRealLayers;
  const z=(cL/(nL_pcs-1))*zSpan-zSpan/2;
  const fK=_pcsFullK||_pcsNK;
  // Per-token scales: compute same way as _buildPCSSpectrum
  function _tkScale(fd){if(!fd)return 0;let mx=0.001;for(let i=0;i<fd.length;i++)if(Math.abs(fd[i])>mx)mx=Math.abs(fd[i]);return 1.2/mx;}
  [[_pcsDotsA,pinnedToken,0xFF6644,_pcsFullA,_tkScale(_pcsFullA)],[_pcsDotsB,pinnedTokenB,0x4477AA,_pcsFullB,_tkScale(_pcsFullB)]].forEach(([dots,tok,colHex,fullData,scale])=>{
    if(!dots||tok<0||!scale)return;
    const pos=dots.geometry.attributes.position.array;
    const col=dots.geometry.attributes.color.array;
    const cr=((colHex>>16)&0xFF)/255, cg=((colHex>>8)&0xFF)/255, cb=(colHex&0xFF)/255;
    for(let pc=0;pc<_pcsNK;pc++){
      pos[pc*3]=(pc/(_pcsNK-1||1))*xSpan-xSpan/2;
      let val=0;
      if(fullData){val=fullData[cL*fK+pc]||0;}
      else if(allL[cL]?.[tok]){val=allL[cL][tok][pc]||0;}
      pos[pc*3+1]=val*scale;
      pos[pc*3+2]=z;
      const inA=vpPairs[0].includes(pc), inB=vpPairs[2].includes(pc);
      const hov=pc===_pcsHoverPC;
      if(hov){col[pc*3]=1;col[pc*3+1]=1;col[pc*3+2]=0.8;}
      else if(inA&&inB){col[pc*3]=1;col[pc*3+1]=0.9;col[pc*3+2]=1;}
      else if(inA){col[pc*3]=1;col[pc*3+1]=0.6;col[pc*3+2]=0.3;}
      else if(inB){col[pc*3]=0.3;col[pc*3+1]=0.6;col[pc*3+2]=1;}
      else{col[pc*3]=cr*0.5;col[pc*3+1]=cg*0.5;col[pc*3+2]=cb*0.5;}
    }
    dots.geometry.attributes.position.needsUpdate=true;
    dots.geometry.attributes.color.needsUpdate=true;
  });
  // Update layer indicator line position
  if(_pcsLayerLine){
    const lp=_pcsLayerLine.geometry.attributes.position.array;
    lp[0]=-xSpan/2;lp[1]=0;lp[2]=z;
    lp[3]=xSpan/2;lp[4]=0;lp[5]=z;
    _pcsLayerLine.geometry.attributes.position.needsUpdate=true;
  }
  // Update variance envelope to current layer
  if(_pcsVarLine&&_layerVar[cL]){
    const vp=_pcsVarLine.geometry.attributes.position.array;
    for(let pc=0;pc<_pcsNK&&pc*3+2<vp.length;pc++){
      const v=_layerVar[cL]?.[pc]||0;
      vp[pc*3+1]=Math.sqrt(v)*3;vp[pc*3+2]=z;
    }
    _pcsVarLine.geometry.attributes.position.needsUpdate=true;
  }
  _markDirty();
}

function _updateTrajDots(){_updatePCSDots();}

// Hover spectrum: lightweight per-layer fetch (~1KB, <1ms on localhost)
// Fetches all K PCs for one token at current layer only.
// _pcsLayerCache removed — hover uses unified _hoverCache
// _updatePCSHover: thin wrapper, uses unified _hoverCache via _fetchHover
function _updatePCSHover(tokIdx){
  if(!_pcsHoverMesh)return;
  if(tokIdx<0){_pcsHoverMesh.geometry.setDrawRange(0,0);_pcsHoverTok=-1;_markDirty();return;}
  _pcsHoverTok=tokIdx;
  const cached=_hoverCache.get(`${tokIdx},${cL}`);
  if(cached)_renderPCSHoverLayer(tokIdx,cached.pcScores);
}
function _renderPCSHoverLayer(tokIdx,scores){
  if(!_pcsHoverMesh||_pcsHoverTok!==tokIdx)return;
  const K=scores.length;
  const xSpan=2.4,zSpan=3.0;
  const nL_pcs=_pcsFullNL||_nRealLayers||nL;
  const z=(cL/((nL_pcs-1)||1))*zSpan-zSpan/2;
  // Use _pcsScale if available (consistent with pinned dots), else auto-scale
  let scale=_pcsScale;
  if(!scale||scale<0.001){let mx=0.001;for(let i=0;i<K;i++)mx=Math.max(mx,Math.abs(scores[i]));scale=1.2/mx;}
  let pos=_pcsHoverMesh.geometry.attributes.position.array;
  if(pos.length<K*3){
    _pcsHoverMesh.geometry.setAttribute('position',new THREE.BufferAttribute(new Float32Array(K*3),3));
    pos=_pcsHoverMesh.geometry.attributes.position.array;
  }
  for(let pc=0;pc<K;pc++){
    pos[pc*3]=(pc/((K-1)||1))*xSpan-xSpan/2;
    pos[pc*3+1]=scores[pc]*scale;
    pos[pc*3+2]=z;
  }
  _pcsHoverMesh.geometry.setDrawRange(0,K);
  _pcsHoverMesh.geometry.attributes.position.needsUpdate=true;
  _markDirty();
}

}

// --- URL state serialization (#43) ---
function _saveState(){
  if(!model)return;
  const s={m:model,d:mode,l:cL,p:[vpPairs[0],vpPairs[2]].map(p=>p.join('-')).join(',')};
  if(pinnedToken>=0)s.a=pinnedToken;if(pinnedTokenB>=0)s.b=pinnedTokenB;
  const h=Object.entries(s).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  history.replaceState(null,'','#'+h);
}
function _loadState(){
  const h=location.hash.slice(1);if(!h)return null;
  const s={};h.split('&').forEach(p=>{const[k,v]=p.split('=');if(k&&v)s[k]=decodeURIComponent(v);});
  return s;
}

// --- Load pipeline: parallel fetches, progressive rendering ---
let _prevModel='',_prevMode='';
function _yieldFrame(){return new Promise(r=>requestAnimationFrame(r));}

async function loadAll(){
  const newModel=document.getElementById('sm').value,newMode=document.getElementById('smd').value;
  const isSameModel=newModel===_prevModel;
  const _ld=document.getElementById('loading');if(_ld)_ld.style.display='flex';
  document.getElementById('st').textContent='Loading...';
  try{
  // Phase 1: parallel fetch of metadata + scores (the two biggest waits)
  const [dmResult,scoreResp]=await Promise.all([
    api(`decomp-meta/${newModel}/${newMode}`),
    fetch(`/api/scores/${newModel}/${newMode}`)
  ]);
  if(dmResult.error){document.getElementById('st').textContent=dmResult.error;if(_ld)_ld.style.display='none';return;}
  dm=dmResult;model=newModel;mode=newMode;
  nL=dm.n_layers;_nRealLayers=dm.n_real_layers||nL;
  // Clear all PCA caches on model switch
  _pcsHoverCache.clear();_hoverCache.clear();_pcFull.clear();_pcMedium.clear();_nfCache.clear();
  _pcsFullA=null;_pcsFullB=null;_pcsFullK=0;_pcsFullNL=0;_pcsScale=0;_pcsNK=0;
  _pcsLoadingA=-1;_pcsLoadingB=-1;_pcsHoverTok=-1;_hoverTok=-1;

  // Phase 2: parse scores binary + fetch layer0 metadata in parallel
  const [buf,d0]=await Promise.all([
    scoreResp.arrayBuffer(),
    api(`decomp/${model}/${mode}?layer=0`)
  ]);
  scripts=d0.scripts;texts=d0.texts;nN=d0.n_tokens;nK=d0.n_components;tokenIds=d0.token_ids||[];
  document.getElementById('ntok').textContent=nN+' tok / '+nK+' PC';
  document.getElementById('st').textContent='Parsing...';

  // Parse binary scores — v2 (HEI2): separate var_k and score_k; v1 (HEIN/0000): shared k
  const dv=new DataView(buf);
  const magic=String.fromCharCode(dv.getUint8(0),dv.getUint8(1),dv.getUint8(2),dv.getUint8(3));
  let bnL,bnN,bnK,bnVK,varOff;
  if(magic==='HEI2'){
    bnL=dv.getUint32(4,true);bnN=dv.getUint32(8,true);bnK=dv.getUint32(12,true);bnVK=dv.getUint32(16,true);varOff=20;
  }else{
    bnL=dv.getUint32(4,true);bnN=dv.getUint32(8,true);bnK=dv.getUint32(12,true);bnVK=bnK;varOff=16;
  }
  _layerVar=[];
  for(let l=0;l<bnL;l++){const v=new Float32Array(bnVK);for(let k=0;k<bnVK;k++)v[k]=dv.getFloat32(varOff+(l*bnVK+k)*4,true);_layerVar.push(v);}
  const scoreOff=varOff+bnL*bnVK*4;
  allL=[];
  for(let l=0;l<bnL;l++){
    const layerU16=new Uint16Array(buf,scoreOff+l*bnN*bnK*2,bnN*bnK);
    const f=new Float32Array(bnN*bnK);
    for(let i=0;i<bnN*bnK;i++)f[i]=f16(layerU16[i]);
    const ls=new Array(bnN);
    for(let t=0;t<bnN;t++)ls[t]=f.subarray(t*bnK,t*bnK+bnK);
    allL.push(ls);
  }
  nK=bnVK;// nK = full variance PC count (spectrum uses this), not the capped score count

  // Legend
  _hiddenScripts.clear();
  const lg=document.getElementById('legend2');lg.textContent='';const ss={};scripts.forEach(s=>ss[s]=(ss[s]||0)+1);
  Object.entries(ss).sort((a,b)=>b[1]-a[1]).filter(([,c])=>c>5).forEach(([s,c])=>{
    const d=document.createElement('div');d.className='lg';d.dataset.script=s;
    const dt=document.createElement('span');dt.className='ld';dt.style.background=CLh[s]||'#aaa';
    d.appendChild(dt);d.appendChild(document.createTextNode(s+'('+c+')'));
    d.addEventListener('click',()=>{
      if(_hiddenScripts.has(s)){_hiddenScripts.delete(s);d.classList.remove('off');}
      else{_hiddenScripts.add(s);d.classList.add('off');}
      _applyFilter();
    });
    lg.appendChild(d);
  });

  // --- State preservation across model switches ---
  // Save current pins by token text for cross-model matching
  const prevPinTextA=pinnedToken>=0?texts[pinnedToken]:null;
  const prevPinTextB=pinnedTokenB>=0?texts[pinnedTokenB]:null;
  const prevPairs=isSameModel?[vpPairs[0].slice(),vpPairs[2].slice()]:null;
  const prevLayer=isSameModel?cL:0;

  // Reset interaction state
  pinnedToken=-1;pinnedTokenB=-1;hoveredToken=-1;_lastDimState=-1;_trajCache={};_wlData=null;_wlBuiltKey='';
  const _tsEl=document.getElementById('tsearch');if(_tsEl)_tsEl.value='';
  const _tsR=document.getElementById('tsresults');if(_tsR)_tsR.textContent='';

  // Preserve cameras across switches (don't reset if user has been orbiting)
  if(!isSameModel){views.forEach(v=>{v.cam.position.set(0,0,2.5);v.ctl.target.set(0,0,0);v.ctl.update();v._fitted=false;});brCam._fitted=false;}

  // Restore PC pairs (keep previous if same model, or from URL, or defaults)
  const _rst=_loadState();let _rstL=prevLayer;
  if(_rst&&_rst.m===model&&_rst.d===mode){
    if(_rst.p){const pp=_rst.p.split(',').map(s=>s.split('-').map(Number));if(pp[0]&&pp[0].length===2)vpPairs[0]=pp[0];if(pp[1]&&pp[1].length===2)vpPairs[2]=pp[1];}
    if(_rst.l!==undefined)_rstL=Math.min(parseInt(_rst.l)||0,_nRealLayers-1);
    if(_rst.a!==undefined){const a=parseInt(_rst.a);if(a>=0&&a<nN)pinnedToken=a;}
    if(_rst.b!==undefined){const b=parseInt(_rst.b);if(b>=0&&b<nN)pinnedTokenB=b;}
  }else if(prevPairs){
    vpPairs[0]=prevPairs[0].map(p=>Math.min(p,nK-1));
    vpPairs[2]=prevPairs[1].map(p=>Math.min(p,nK-1));
    vpPairs[1]=prevPairs[1].map(p=>Math.min(p,nK-1));
    _rstL=Math.min(prevLayer,_nRealLayers-1);
  }else{vpPairs[0]=[0,1];vpPairs[2]=[2,3];}// delta (vpPairs[1]) auto-derived

  // Cross-model token matching: find same token text in new model
  if(pinnedToken<0&&prevPinTextA){const idx=texts.indexOf(prevPinTextA);if(idx>=0)pinnedToken=idx;}
  if(pinnedTokenB<0&&prevPinTextB){const idx=texts.indexOf(prevPinTextB);if(idx>=0)pinnedTokenB=idx;}

  // Phase 3: show clouds immediately, then build heavy stuff async
  _initPCSScene();// must be before any hover or setLayer
  _clearBrowserSelBoxes();_lastPK='';// force precompute on first setLayer
  setLayer(_rstL);showPinDetail(pinnedToken);updatePinMarkers();
  document.getElementById('st').textContent=`${model}/${mode} ${nN}tok ${nL}L`;
  _prevModel=model;_prevMode=mode;
  }catch(e){document.getElementById('st').textContent='Error: '+e.message;console.error(e);}
  finally{if(_ld)_ld.style.display='none';}

  // Phase 4: heavy builds in background (don't block interaction)
  await _yieldFrame();
  try{loadGateHeatmap();}catch(e){console.error('gate:',e);}
  await _yieldFrame();
  try{buildLeftViewports();}catch(e){console.error('left:',e);}
  await _yieldFrame();
  try{_brComputeCells();await _ensurePCData();buildBrowser();}catch(e){console.error('browser:',e);}
  _markDirty();
}
async function init(){const models=await api('models');const sel=document.getElementById('sm');const tM=models.filter(m=>m.architecture==='transformer');const bm={};tM.forEach(m=>{if(!bm[m.model])bm[m.model]=[];bm[m.model].push(m.mode);});Object.keys(bm).sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
  // Restore from URL or default to smollm2-135m
  const _st=_loadState();
  if(_st&&_st.m&&bm[_st.m]){sel.value=_st.m;if(_st.d)document.getElementById('smd').value=_st.d;}
  else{const prefer=['smollm2-135m','smollm2-360m','qwen-0.5b'];for(const p of prefer){if(bm[p]){sel.value=p;break;}}}
  document.getElementById('bl').addEventListener('click',loadAll);
  document.getElementById('lemb').addEventListener('click',()=>{if(nL>_nRealLayers)setLayer(_nRealLayers);else setLayer(0);});
  document.getElementById('llmh').addEventListener('click',()=>{if(nL>_nRealLayers+1)setLayer(_nRealLayers+1);else setLayer(_nRealLayers-1);});
  document.getElementById('lprev').addEventListener('click',()=>{if(_nRealLayers)setLayer((cL-1+_nRealLayers)%_nRealLayers);});
  document.getElementById('lnext').addEventListener('click',()=>{if(_nRealLayers)setLayer((cL+1)%_nRealLayers);});
  document.getElementById('lplay').addEventListener('click',_togglePlay);
  // Token search (debounced, event delegation)
  let _searchTimer=null;
  const _tsResults=document.getElementById('tsresults');
  _tsResults.addEventListener('click',e=>{const d=e.target.closest('[data-ti]');if(!d)return;const i=parseInt(d.dataset.ti);if(e.shiftKey||_isRightClick(e)){pinnedTokenB=i;}else{pinnedToken=i;}updatePinMarkers();showPinDetail(pinnedToken);_updateBrowserOverlay();updateLeftViewports();_onPinChange();_saveState();});
  _tsResults.addEventListener('contextmenu',e=>{e.preventDefault();const d=e.target.closest('[data-ti]');if(!d)return;pinnedTokenB=parseInt(d.dataset.ti);updatePinMarkers();showPinDetail(pinnedToken);_updateBrowserOverlay();updateLeftViewports();_onPinChange();_saveState();});
  document.getElementById('tsearch').addEventListener('input',e=>{
    clearTimeout(_searchTimer);
    _searchTimer=setTimeout(()=>{
      const q=e.target.value.toLowerCase().trim();_tsResults.textContent='';
      if(!q||q.length<1||!texts.length)return;
      const frag=document.createDocumentFragment();let count=0;
      for(let i=0;i<texts.length&&count<20;i++){
        if((texts[i]||'').toLowerCase().includes(q)){
          const d=document.createElement('div');d.style.cssText='cursor:pointer;padding:1px 0;border-bottom:1px solid #111';
          d.textContent=`#${i} ${texts[i]} [${scripts[i]}]`;d.dataset.ti=i;
          frag.appendChild(d);count++;
        }
      }
      if(!count){const d=document.createElement('div');d.textContent='no matches';frag.appendChild(d);}
      _tsResults.appendChild(frag);
    },150);
  });
  loadAll();}
init().catch(e=>{console.error('init failed:',e);document.getElementById('loading').style.display='none';document.getElementById('st').textContent='Error: '+e.message;});
// --- RAF-based playback (replaces setInterval) ---
let _playRAF=null,_playLastT=0;
const _playMS=100; // ms per layer — 10 layers/sec, full sweep in 3s at 30 layers
function _playFrame(t){
  if(!play)return;
  if(t-_playLastT>=_playMS){_playLastT=t;setLayer((cL+1)%_nRealLayers,true);}
  _playRAF=requestAnimationFrame(_playFrame);
}
function _togglePlay(){
  play=!play;document.getElementById('lplay').textContent=play?'\u23F8':'\u25B6';
  if(play){_playLastT=performance.now();_playRAF=requestAnimationFrame(_playFrame);}
  else{if(_playRAF){cancelAnimationFrame(_playRAF);_playRAF=null;}_updateBrowserLayer();_updateBrowserSelBoxes();_updateBrowserOverlay();if(pinnedToken>=0){updatePinMarkers();showPinDetail(pinnedToken);}}
}
// --- Viewport capture ---
function _captureLabel(vi){
  if(vi==='pcs')return'spectrum';if(vi==='br0')return'prism';
  if(typeof vi==='string'&&vi.startsWith('l'))return'internals'+vi[1];
  if(typeof vi==='string'&&vi.startsWith('r'))return'right'+vi[1];
  return'vp'+vi;
}
function _captureFilename(vi,suffix){
  return`${model}_${mode}_L${String(cL).padStart(2,'0')}_${_captureLabel(vi)}.${suffix}`;
}
function captureViewport(sc,cam,el,vi,scale){
  scale=scale||3;
  const w=el.clientWidth*scale,h=el.clientHeight*scale;
  const tmp=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true,alpha:false});
  tmp.setSize(w,h);tmp.setClearColor(sc.background||0x0a0a0a);tmp.clear();
  cam.aspect=w/h;cam.updateProjectionMatrix();
  tmp.render(sc,cam);
  tmp.domElement.toBlob(blob=>{
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=_captureFilename(vi,'png');a.click();
    URL.revokeObjectURL(a.href);tmp.dispose();
    cam.aspect=el.clientWidth/el.clientHeight;cam.updateProjectionMatrix();
  });
}
let _recording=false;
async function recordViewport(sc,cam,el,vi,fps){
  if(_recording)return;_recording=true;
  fps=fps||10;const scale=2;
  const w=el.clientWidth*scale,h=el.clientHeight*scale;
  const tmp=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
  tmp.setSize(w,h);
  const stream=tmp.domElement.captureStream(0);
  const rec=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:5000000});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
  const recBtn=document.getElementById('lrec');
  if(recBtn)recBtn.style.color='#ff4444';
  rec.start();
  const startL=cL;
  for(let l=0;l<_nRealLayers;l++){
    setLayer(l,true);
    cam.aspect=w/h;cam.updateProjectionMatrix();
    tmp.render(sc,cam);
    stream.getVideoTracks()[0].requestFrame();
    await new Promise(r=>setTimeout(r,1000/fps));
  }
  rec.stop();
  await new Promise(r=>{rec.onstop=r;});
  const blob=new Blob(chunks,{type:'video/webm'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=_captureFilename(vi,'webm');a.click();
  URL.revokeObjectURL(a.href);tmp.dispose();
  cam.aspect=el.clientWidth/el.clientHeight;cam.updateProjectionMatrix();
  setLayer(startL);
  _recording=false;
  if(recBtn)recBtn.style.color='#664444';
}
// Wire [S] buttons on all .cbtn containers
function _addSnapButtons(){
  document.querySelectorAll('.cbtn[data-v]').forEach(bar=>{
    const vk=bar.dataset.v;
    const btn=document.createElement('button');btn.textContent='S';btn.title='Snapshot (P)';
    btn.style.cssText='margin-left:2px';
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      // Resolve scene+camera for this viewport key
      const vi=parseInt(vk);
      if(!isNaN(vi)&&views[vi]){captureViewport(views[vi].sc,views[vi].cam,views[vi].el,vi);return;}
      if(vk==='pcs'&&_pcsSc&&_pcsCam&&_pcsEl){captureViewport(_pcsSc,_pcsCam,_pcsEl,'pcs');return;}
      // left/right viewports
      const li=vk.match(/^l(\d)/);if(li&&leftViews[+li[1]]){const v=leftViews[+li[1]];captureViewport(v.sc,v.cam,v.el,'l'+li[1]);return;}
      const ri=vk.match(/^r(\d)/);if(ri&&rightViews[+ri[1]]){const v=rightViews[+ri[1]];captureViewport(v.sc,v.cam,v.el,'r'+ri[1]);return;}
      if(vk==='all'){/* master snap: capture all viewports */
        views.forEach((v,i)=>captureViewport(v.sc,v.cam,v.el,i));return;}
    });
    bar.appendChild(btn);
  });
}
_addSnapButtons();
// REC button: record last-hovered viewport (or vp0)
document.getElementById('lrec').addEventListener('click',()=>{
  const vi=_lastVP;const v=views[vi];
  if(v)recordViewport(v.sc,v.cam,v.el,vi);
});
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;if(e.key==='ArrowRight')setLayer((cL+1)%_nRealLayers);if(e.key==='ArrowLeft')setLayer((cL-1+_nRealLayers)%_nRealLayers);if(e.key===' '){e.preventDefault();_togglePlay();}if(e.key==='Escape'&&(pinnedToken>=0||pinnedTokenB>=0)){pinnedToken=-1;pinnedTokenB=-1;updatePinMarkers();highlightToken(-1);showPinDetail(-1);_updateBrowserOverlay();}
if(e.key==='p'||e.key==='P'){/* snapshot last-hovered viewport */const vi=_lastVP;const v=views[vi];if(v)captureViewport(v.sc,v.cam,v.el,vi);}
if(e.key==='g'||e.key==='G'){/* record last-hovered viewport */const vi=_lastVP;const v=views[vi];if(v)recordViewport(v.sc,v.cam,v.el,vi);}
});
let _needsRender=true,_frameCount=0,_fpsTime=performance.now();
function _markDirty(){_needsRender=true;}
views.forEach(v=>v.ctl.addEventListener('change',_markDirty));
brCtl.addEventListener('change',_markDirty);
leftViews.forEach(v=>v.ctl.addEventListener('change',_markDirty));
rightViews.forEach(v=>v.ctl.addEventListener('change',_markDirty));
(function anim(){requestAnimationFrame(anim);
  const damping=views.some(v=>v.ctl.enableDamping&&v.ctl._needsUpdate)||brCtl._needsUpdate||leftViews.some(v=>v.ctl._needsUpdate);
  if(!_needsRender&&!damping&&!play)return;
  _needsRender=false;
  // Single renderer: clear once, render each region with scissor
  rdr.setScissorTest(false);rdr.setClearColor(0x151515);rdr.clear();rdr.setScissorTest(true);
  views.forEach((v,vi)=>{v.ctl.update();const d=v.cam.position.length();const ps=Math.min(0.15,Math.max(0.004,d*0.012));v.mtl.size=ps;
    if(vi>=NC&&v.trajMarker)v.trajMarker.material.size=Math.min(0.1,Math.max(0.006,d*0.015));
    // Scale pin/hover markers with zoom
    const ms=Math.min(0.2,Math.max(0.01,d*0.04));
    if(pinMarkers[vi].visible)pinMarkers[vi].material.size=ms;
    if(pinMarkersB[vi].visible)pinMarkersB[vi].material.size=ms;
    if(highlightMarkers[vi].visible)highlightMarkers[vi].material.size=ms*0.7;
    _renderRegion(v.el,v.sc,v.cam);});
  _brPanels.forEach(p=>{p.ctl.update();_renderRegion(p.el,brSc,p.cam);});
  leftViews.forEach(v=>{if(v.built){v.ctl.update();_renderRegion(v.el,v.sc,v.cam);}});
  rightViews.forEach(v=>{v.ctl.update();_renderRegion(v.el,v.sc,v.cam);});
  if(_pcsSc&&_pcsEl){_pcsCtl.update();_renderRegion(_pcsEl,_pcsSc,_pcsCam);}
  // FPS counter
  _frameCount++;const now=performance.now();if(now-_fpsTime>1000){const fps=Math.round(_frameCount*1000/(now-_fpsTime));const el=document.getElementById('fpsDisplay');if(el)el.textContent=fps+'fps';_frameCount=0;_fpsTime=now;}
})();
