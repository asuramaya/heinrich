function _trajStats(idx){
  if(_trajCache[idx])return _trajCache[idx];
  let totalMove=0,maxDelta=0,maxL=0;
  for(let l=1;l<nL;l++){let d=0;for(let p=0;p<Math.min(nK,6);p++)d+=(allL[l][idx][p]-allL[l-1][idx][p])**2;d=Math.sqrt(d);totalMove+=d;if(d>maxDelta){maxDelta=d;maxL=l;}}

// Interaction — pixel-accurate raycasting
function _rayHit(vi,e){const v=views[vi];const r=v.cv.getBoundingClientRect();
  ms.x=((e.clientX-r.left)/r.width)*2-1;ms.y=-((e.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(ms,v.cam);
  // Match threshold to actual rendered point size:
  // sizeAttenuation scales world-unit size by 1/distance in perspective.
  // We want ~6px pick radius regardless of zoom.
  const vpH=r.height||1;const fovRad=v.cam.fov*Math.PI/180;
  const pixelToWorld=2*Math.tan(fovRad/2)/vpH;// world units per pixel at distance 1
  const d=v.cam.position.length()||1;
  const pickRadiusPx=6;// pixels of pick tolerance
  ray.params.Points.threshold=pickRadiusPx*pixelToWorld*d;
  const h=ray.intersectObject(v.pts);
  if(h.length>1){
    // Multiple hits — pick the one closest to the ray (not closest to camera)
    h.sort((a,b)=>a.distanceToRay-b.distanceToRay);
  }
  if(h.length>0)return h[0].index%nN;
  return -1;}
function _isRightClick(e){return e.button===2||(e.button===0&&e.ctrlKey);} // ctrl+click=right on Mac

// Camera snap
function _snapOne(vi,axis){
  const v=views[vi];const d=v.cam.position.length()||2.5;v.ctl.target.set(0,0,0);
  if(axis==='x')v.cam.position.set(d,0,0);
  else if(axis==='y')v.cam.position.set(0,d,0);
  else if(axis==='z')v.cam.position.set(0,0,d);
  else if(vi>=NC)v.cam.position.set(1.5,0.5,3);// trajectory: angled
  else v.cam.position.set(1.5,1.0,2.0);// cloud: 3/4 angle
  v.ctl.update();_markDirty();
}
function _snapBrowser(axis){
  const n=nK;const cx=Math.min(n,15)/2*_SP,cy=-Math.min(n,15)/3*_SP,cz=cL*_ZSP;
  brCtl.target.set(cx,cy,cz);const d=brCam.position.distanceTo(brCtl.target)||15;
  if(axis==='x')brCam.position.set(cx+d,cy,cz);
  else if(axis==='y')brCam.position.set(cx,cy+d,cz);
  else if(axis==='z')brCam.position.set(cx,cy,cz+d);
  else if(axis==='f1'||axis==='f2'){
    const pi=axis==='f1'?0:2;// F1=pair A, F2=pair B
    _brFollow=_brFollow===pi?-1:pi;
    const[a,b]=vpPairs[pi];
    const tx=Math.max(a,b)*_SP,ty=-Math.min(a,b)*_SP;
    brCtl.target.set(tx,ty,cz);brCam.position.set(tx,ty,cz+5);
  }else{_brFollow=-1;brCam.position.set(cx+5,cy+3,cz+15);}// angled default
  brCtl.update();_markDirty();
}

function _applyFilter(){

function updateVP(vi,pcX,pcY,pcZ,layer){const v=views[vi];v.pcX=pcX;v.pcY=pcY;v.pcZ=pcZ;v.layer=layer;

function buildTraj(vi,pcX,pcY){const v=views[vi];v.pcX=pcX;v.pcY=pcY;if(v.trajGroup){v.trajGroup.children.forEach(c=>{if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});v.sc.remove(v.trajGroup);}if(v.trajMarker){v.trajMarker.geometry.dispose();v.trajMarker.material.dispose();v.sc.remove(v.trajMarker);}v.trajGroup=new THREE.Group();let mx=0;for(const S of allL)for(let i=0;i<nN;i++)mx=Math.max(mx,Math.abs(S[i][pcX]||0),Math.abs(S[i][pcY]||0));v._trajScale=mx||1;const maxLines=Math.min(nN,800);const step=Math.max(1,Math.floor(nN/maxLines));for(let i=0;i<nN;i+=step){const pts=[];for(let l=0;l<nL;l++){const S=allL[l];pts.push(new THREE.Vector3((S[i][pcX]||0)/mx,(S[i][pcY]||0)/mx,(l/(nL-1))*2-1));}const g=new THREE.BufferGeometry().setFromPoints(pts);const line=new THREE.Line(g,new THREE.LineBasicMaterial({color:CL[scripts[i]]||0xAAAAAA,transparent:true,opacity:0.15,depthWrite:false}));line.userData={ti:i};v.trajGroup.add(line);}v.sc.add(v.trajGroup);const pg=new THREE.BufferGeometry();const _tp=new Float32Array(nN*3),_tc=new Float32Array(nN*3);for(let i=0;i<nN;i++){const hex=CL[scripts[i]]||0xAAAAAA;_tc[i*3]=((hex>>16)&0xFF)/255;_tc[i*3+1]=((hex>>8)&0xFF)/255;_tc[i*3+2]=(hex&0xFF)/255;}pg.setAttribute('position',new THREE.BufferAttribute(_tp,3));pg.setAttribute('color',new THREE.BufferAttribute(_tc,3));v.trajMarker=new THREE.Points(pg,new THREE.PointsMaterial({size:0.018,vertexColors:true,transparent:true,opacity:0.9,sizeAttenuation:true,depthWrite:false}));v.sc.add(v.trajMarker);updateTrajMarker(vi);document.getElementById('ax'+vi).textContent=`${pcX}/${pcY}+d`;}
function updateTrajMarker(vi){const v=views[vi];
  const buf=v._trajBufs&&v._trajBufs[cL];if(!buf)return;

function thirdPC(a,b){for(let i=0;i<nK;i++){if(i!==a&&i!==b)return i;}return 0;}
let _lastPK='';
function updateAllViewports(){
  // Delta pair: X=second PC of pair A, Y=first PC of pair B (cross-axes, no overlap with A or B)
  vpPairs[1]=[vpPairs[0][1],vpPairs[2][0]];
  const pk=vpPairs.map(p=>p.join(',')).join('|');
  if(pk!==_lastPK){
    // PC pairs changed — precompute ALL layer buffers
    for(let i=0;i<NC;i++){const[a,b]=vpPairs[i];views[i].pcX=a;views[i].pcY=b;views[i].pcZ=thirdPC(a,b);_precomputeCloud(i);}
    for(let i=0;i<NC;i++){buildTraj(NC+i,vpPairs[i][0],vpPairs[i][1]);_precomputeTraj(NC+i);}
    if(_hiddenScripts.size){views.forEach((v,vi)=>{if(vi>=NC&&v.trajGroup)v.trajGroup.children.forEach(c=>{const ti=c.userData?.ti;if(ti!==undefined)c.visible=!_hiddenScripts.has(scripts[ti]);});});}
    const lbl=document.getElementById('lv0lbl');if(lbl)lbl.textContent=`Δ PC${vpPairs[1][0]}×PC${vpPairs[1][1]}`;
    _rebuildWeightLines();// instant — just toggles visibility

  }

// 3D prism — all PC pairs as mini point clouds. One merged geometry per layer.
// Shows nearby layers with opacity falloff. Scales to full nK.
const _SP=1.6,_ZSP=0.3,_BR_RAD=0.55,_BR_PTS=50;
const _BR_VISIBLE_LAYERS=3;// layers shown around cL
let _brOverlay=[];
let _brBuilt=false;
let _brFollow=-1;
let _brMxCache={};
let _brLayers=[];// [{pts, layer, origPos, tokMap}]
let _brN=0;// PCs shown in prism (may be capped for huge models)

function _disposeScene(sc){
  while(sc.children.length){const c=sc.children[0];sc.remove(c);if(c.geometry)c.geometry.dispose();if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}}}

function buildBrowser(){
  _disposeScene(brSc);
  _brOverlay=[];_brMxCache={};_brLayers=[];
  // Cap PCs for very large models — show first N where C(N,2) stays manageable
  _brN=nK;
  while(_brN>10&&_brN*(_brN-1)/2*_BR_PTS>500000)_brN--;// cap total points at ~500K
  const n=_brN;const nPairs=n*(n-1)/2;
  const step=Math.max(1,Math.floor(nN/_BR_PTS));const ptsPerPair=Math.ceil(nN/step);

  // Build one merged point cloud per layer
  for(let l=0;l<nL;l++){
    const S=allL[l];if(!S)continue;
    const pos=new Float32Array(nPairs*ptsPerPair*3);
    const col=new Float32Array(nPairs*ptsPerPair*3);
    const origPos=new Float32Array(nPairs*ptsPerPair*3);
    const tokMap=new Uint16Array(nPairs*ptsPerPair);
    let idx=0;
    for(let a=0;a<n;a++)for(let b=a+1;b<n;b++){
      let mx=0;for(let i=0;i<nN;i+=step)mx=Math.max(mx,Math.abs(S[i][a]||0),Math.abs(S[i][b]||0));mx=mx||1;
      _brMxCache[`${a},${b},${l}`]=mx;
      for(let i=0;i<nN;i+=step){
        const sx=Math.max(-_BR_RAD,Math.min(_BR_RAD,(S[i][a]||0)/mx*_BR_RAD));
        const sy=Math.max(-_BR_RAD,Math.min(_BR_RAD,(S[i][b]||0)/mx*_BR_RAD));
        pos[idx*3]=b*_SP+sx;pos[idx*3+1]=-a*_SP-sy;pos[idx*3+2]=l*_ZSP;
        origPos[idx*3]=pos[idx*3];origPos[idx*3+1]=pos[idx*3+1];origPos[idx*3+2]=pos[idx*3+2];
        tokMap[idx]=i;
        const hex=CL[scripts[i]]||0xAAAAAA;
        col[idx*3]=((hex>>16)&0xFF)/255;col[idx*3+1]=((hex>>8)&0xFF)/255;col[idx*3+2]=(hex&0xFF)/255;
        idx++;
      }
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos.subarray(0,idx*3),3));
    geo.setAttribute('color',new THREE.BufferAttribute(col.subarray(0,idx*3),3));
    const mat=new THREE.PointsMaterial({size:0.03,vertexColors:true,transparent:true,opacity:0.05,sizeAttenuation:true,depthWrite:false});
    const pts=new THREE.Points(geo,mat);pts.frustumCulled=false;
    brSc.add(pts);_brLayers.push({pts,layer:l,origPos:origPos.subarray(0,idx*3),tokMap:tokMap.subarray(0,idx)});
  }
  _brBuilt=true;_updateBrowserLayer();_updateBrowserOverlay();
  if(!brCam._fitted){const cx=Math.min(n,15)/2*_SP,cy=-Math.min(n,15)/3*_SP;brCam.position.set(cx,cy,25);brCtl.target.set(cx,cy,cL*_ZSP);brCtl.update();brCam._fitted=true;}
}

function _updateBrowserLayer(){
  if(!_brBuilt)return;
  _brLayers.forEach(({pts,layer})=>{
    const d=Math.abs(layer-cL);
    if(d>_BR_VISIBLE_LAYERS){pts.visible=false;return;}
    pts.visible=true;
    pts.material.opacity=d===0?0.7:d===1?0.2:d===2?0.1:d<=3?0.04:0.02;
    pts.material.size=d===0?0.04:0.025;
  });
  if(_brFollow>=0){
    const[a,b]=vpPairs[_brFollow];const n=_brN;
    if(a<n&&b<n){
      const tx=Math.max(a,b)*_SP,ty=-Math.min(a,b)*_SP,tz=cL*_ZSP;
      const off=brCam.position.clone().sub(brCtl.target);
      brCtl.target.set(tx,ty,tz);brCam.position.set(tx+off.x,ty+off.y,tz+off.z);brCtl.update();
    }
  }
}

function _applyBrowserFilter(){
  if(!_brBuilt)return;
  _brLayers.forEach(({pts,origPos,tokMap})=>{
    if(!origPos||!tokMap)return;
    const pos=pts.geometry.attributes.position.array;
    if(!_hiddenScripts.size){pos.set(origPos);}
    else{for(let j=0;j<tokMap.length;j++){
      if(_hiddenScripts.has(scripts[tokMap[j]])){pos[j*3]=9999;pos[j*3+1]=9999;pos[j*3+2]=9999;}
      else{pos[j*3]=origPos[j*3];pos[j*3+1]=origPos[j*3+1];pos[j*3+2]=origPos[j*3+2];}
    }}
    pts.geometry.attributes.position.needsUpdate=true;
  });
}
// Persistent selection box markers for playback — cheap to update
let _brSelBoxes=[];// {mesh, pair, layer} — current layer selection boxes
function _updateBrowserSelBoxes(){
  const n=nK;
  if(_brSelBoxes.length){
    // Just update opacity based on distance to current layer
    _brSelBoxes.forEach(b=>{
      const d=Math.abs(b.layer-cL);
      b.mesh.material.opacity=d===0?0.8:d===1?0.3:d===2?0.15:0;
      b.mesh.visible=d<=2;
    });
    return;
  }
  // Build persistent boxes for pair A (0) and pair B (2) only — skip delta (1)
  [0,2].forEach(pi=>{const[pa,pb]=vpPairs[pi];if(pa>=n||pb>=n)return;const a=Math.min(pa,pb),b=Math.max(pa,pb);
    for(let l=0;l<nL;l++){
      const eg=new THREE.EdgesGeometry(new THREE.PlaneGeometry(_BR_RAD*2.2,_BR_RAD*2.2));
      const e=new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:pi===0?0xFF6644:0x4477AA,transparent:true,opacity:0}));
      e.position.set(b*_SP,-a*_SP,l*_ZSP);brSc.add(e);
      _brSelBoxes.push({mesh:e,pair:pi,layer:l});
    }
  });
  _updateBrowserSelBoxes();// apply opacity

// Preloaded gate heatmap — [nN × nRealLayers] float16, indexed locally
let _gateHeat=null; // Float32Array, row-major [token][layer]
let _gateNL=0;
async function loadGateHeatmap(){
  try{const resp=await fetch(`/api/gate-heatmap/${model}/${mode}`);if(!resp.ok)return;
    const buf=await resp.arrayBuffer();
    // Parse npy: magic(6)+ver(2)+HEADER_LEN(2)+header_str. Data starts after padding to 64.
    const dv=new DataView(buf);const hLen=dv.getUint16(8,true);
    const off=10+hLen;// npy v1: 6 magic + 2 version + 2 header_len + header_str (already padded to 64)
    const data=new Uint16Array(buf,off);
    const raw=new Float32Array(data.length);
    for(let i=0;i<data.length;i++)raw[i]=f16(data[i]);
    _gateHeat=raw;_gateNL=_nRealLayers;
  }catch(e){_gateHeat=null;}
}
// Local gate lookup — instant, no HTTP
function getGateRow(tokIdx){
  if(!_gateHeat||tokIdx<0)return null;
  const row=new Float32Array(_gateNL);
  for(let l=0;l<_gateNL;l++)row[l]=_gateHeat[tokIdx*_gateNL+l];
  return row;
}

function _rebuildWeightLines(){
  if(!_wlData||!Array.isArray(_wlData)||!_wlData.length||!leftViews.length)return;
  const key=`${vpPairs[0]},${vpPairs[2]}`;
  const needsRebuild=key!==_wlBuiltKey;

  const nMat=_wlData[0]?.matrices?.length||0;if(!nMat)return;
  // Each left viewport shows its respective pair: lv0=A, lv1=delta, lv2=B
  const pairPCs=[[vpPairs[0][0],vpPairs[0][1]],[vpPairs[1][0],vpPairs[1][1]],[vpPairs[2][0],vpPairs[2][1]]];
  const pairColors=[0xFF6644,0xAABBCC,0x4477AA];
  leftViews.forEach((lv,li)=>{
    if(!lv)return;
    if(!lv._grid){lv._grid=new THREE.GridHelper(2,6,0x1a1a1a,0x141414);lv._grid.rotation.x=Math.PI/2;lv.sc.add(lv._grid);}
    const pcs=pairPCs[li]||[0,1];
    // Layer dots — weight alignment + variance + gate at current layer
    if(!lv._layerDots){
      const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(150*3),3));g.setAttribute('color',new THREE.BufferAttribute(new Float32Array(150*3),3));
      lv._layerDots=new THREE.Points(g,new THREE.PointsMaterial({size:0.08,vertexColors:true,transparent:true,opacity:0.95,sizeAttenuation:true,depthWrite:false,depthTest:false}));
      lv._layerDots.renderOrder=10;lv._layerDots.frustumCulled=false;lv.sc.add(lv._layerDots);
    }

    const col=lv._layerDots.geometry.attributes.color.array;
    let di=0;
    // Weight dots for this pair's PCs
    pcs.forEach(pc=>{for(let mi=0;mi<nMat&&di<60;mi++){
      const al=_wlData[cL]?.matrices?.[mi]?.alignment||[];
      pos[di*3]=(mi/(nMat-1))*2-1;pos[di*3+1]=(al[pc]||0)*1.2;pos[di*3+2]=z;
      const hex=_WL_COLORS[mi];col[di*3]=((hex>>16)&0xFF)/255;col[di*3+1]=((hex>>8)&0xFF)/255;col[di*3+2]=(hex&0xFF)/255;di++;}});
    // Variance dots
    pcs.forEach((pc,pi)=>{if(!_layerVar[cL]||di>=80)return;const v=_layerVar[cL][pc]||0;
      pos[di*3]=-1.2+pi*0.2;pos[di*3+1]=v*2;pos[di*3+2]=z;const hx=pairColors[li];col[di*3]=((hx>>16)&0xFF)/255;col[di*3+1]=((hx>>8)&0xFF)/255;col[di*3+2]=(hx&0xFF)/255;di++;});
    // Gate dots for pinned tokens
    if(pinnedToken>=0&&_gateHeat){const row=getGateRow(pinnedToken);if(row){const mx=Math.max(...row)||1;
      for(let l=0;l<_nRealLayers&&di<120;l++){pos[di*3]=1.3;pos[di*3+1]=(row[l]/mx)*1.5;pos[di*3+2]=(l/(_nRealLayers-1))*2-1;col[di*3]=1;col[di*3+1]=0.4;col[di*3+2]=0.1;di++;}}}
    if(pinnedTokenB>=0&&_gateHeat){const row=getGateRow(pinnedTokenB);if(row){const mx=Math.max(...row)||1;
      for(let l=0;l<_nRealLayers&&di<150;l++){pos[di*3]=1.5;pos[di*3+1]=(row[l]/mx)*1.5;pos[di*3+2]=(l/(_nRealLayers-1))*2-1;col[di*3]=0.2;col[di*3+1]=0.4;col[di*3+2]=0.8;di++;}}}
    for(let i=di;i<150;i++){pos[i*3]=9999;pos[i*3+1]=9999;pos[i*3+2]=9999;}
    lv._layerDots.geometry.attributes.position.needsUpdate=true;lv._layerDots.geometry.attributes.color.needsUpdate=true;lv._layerDots.geometry.setDrawRange(0,di);
    _updateGateLines(lv);
    // Build weight lines on first call
    if(needsRebuild){
      if(lv._wlLines){lv._wlLines.forEach(({line})=>{lv.sc.remove(line);line.geometry.dispose();line.material.dispose();});lv._wlLines=null;}
      if(lv._varLines){lv._varLines.forEach(({line})=>{lv.sc.remove(line);line.geometry.dispose();line.material.dispose();});lv._varLines=null;}
      lv._wlLines=[];lv._varLines=[];
      pcs.forEach(pc=>{
        for(let mi=0;mi<nMat;mi++){
          const pts=[];for(let l=0;l<_nRealLayers;l++){const al=_wlData[l]?.matrices?.[mi]?.alignment||[];
            pts.push(new THREE.Vector3((mi/(nMat-1))*2-1,(al[pc]||0)*1.2,(l/(_nRealLayers-1))*2-1));}
          const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:_WL_COLORS[mi],transparent:true,opacity:0.7}));
          line.frustumCulled=false;lv.sc.add(line);lv._wlLines.push({line,mi,pc});}

// --- Neuron activation charts (2D canvas) ---
function renderNeuronChart(tok,canvasId,rgb){
  const cv=document.getElementById(canvasId);if(!cv)return;
  if(tok<0||!_gateHeat){cv.style.display='none';return;}
  const row=getGateRow(tok);if(!row){cv.style.display='none';return;}
  cv.style.display='block';
  const w=cv.parentElement.clientWidth||200,h=40;
  cv.width=w*2;cv.height=h*2;// 2x for retina
  const ctx=cv.getContext('2d');ctx.scale(2,2);ctx.clearRect(0,0,w,h);
  const mx=Math.max(...row)||1;const bw=w/_nRealLayers;
  // Area fill
  ctx.beginPath();ctx.moveTo(0,h);
  for(let l=0;l<_nRealLayers;l++){const v=row[l]/mx;ctx.lineTo(l*bw+bw/2,h-v*(h-2));}
  ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle=`rgba(${rgb},0.15)`;ctx.fill();
  // Line
  ctx.beginPath();
  for(let l=0;l<_nRealLayers;l++){const v=row[l]/mx;const x=l*bw+bw/2,y=h-v*(h-2);l===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.strokeStyle=`rgba(${rgb},0.7)`;ctx.lineWidth=1;ctx.stroke();
  // Current layer marker
  const cx=cL*bw+bw/2;ctx.fillStyle=`rgba(${rgb},0.9)`;ctx.fillRect(cx-1,0,2,h);
  // Peak marker
  let peakL=0;for(let l=1;l<_nRealLayers;l++)if(row[l]>row[peakL])peakL=l;
  const px=peakL*bw+bw/2,py=h-(row[peakL]/mx)*(h-2);
  ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fillStyle=`rgb(${rgb})`;ctx.fill();
  // Label
  ctx.font='7px monospace';ctx.fillStyle=`rgba(${rgb},0.6)`;
  ctx.fillText(`peak L${peakL}`,2,8);ctx.fillText(`${row[cL].toFixed(1)}`,w-30,8);
}

    const pts=[];for(let l=0;l<_nRealLayers;l++)pts.push(new THREE.Vector3(1.5,(row[l]/mx)*1.5,(l/(_nRealLayers-1))*2-1));

// Attention pattern in weights viewport — for template mode pinned token
function _updateAttnInWeights(lv){
  if(!lv)return;

  if(!_attnData||pinnedToken<0||mode!=='template')return;
  lv._attnLines=[];
  // Show self-attention fraction per layer as a line at X=-1.5
  const pts=[];
  for(let l=0;l<Math.min(_attnData.length,_nRealLayers);l++){
    const heads=_attnData[l]?.heads;if(!heads||!heads.length){pts.push(new THREE.Vector3(-1.5,0,(l/(_nRealLayers-1))*2-1));continue;}
    // Average self-attention across heads (last position = self)
    let selfAttn=0;heads.forEach(h=>{selfAttn+=h[h.length-1]||0;});selfAttn/=heads.length;
    pts.push(new THREE.Vector3(-1.5,selfAttn*1.5,(l/(_nRealLayers-1))*2-1));
  }
  if(pts.length>1){
    const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x88FFAA,transparent:true,opacity:0.6}));
    line.frustumCulled=false;lv.sc.add(line);lv._attnLines.push(line);

  document.getElementById('ht').textContent=model+' '+ln;
  const se=document.getElementById('hs');se.textContent=s;se.style.color=co;
  document.getElementById('hst').textContent=`PC1:${p1}% dim:${lm.intrinsic_dim||'?'}`;
  document.getElementById('llbl').textContent=ln;
}
function setLayer(l,light){cL=l;updateAllViewports();updateHUD();
  _updateBrowserLayer();_updateBrowserSelBoxes();
  if(!light)_updateBrowserOverlay();
  updateLeftViewports();
  if(pinnedToken>=0||pinnedTokenB>=0){_syncAllPins(!play);if(!play)showPinDetail(pinnedToken);}
  _markDirty();if(!light)_saveState();}

// --- URL state serialization (#43) ---
function _saveState(){
  if(!model)return;
  const s={m:model,d:mode,l:cL,p:[vpPairs[0],vpPairs[2]].map(p=>p.join('-')).join(',')};
  if(pinnedToken>=0)s.a=pinnedToken;if(pinnedTokenB>=0)s.b=pinnedTokenB;
  const h=Object.entries(s).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  history.replaceState(null,'','#'+h);
}
function _loadState(){
  const h=location.hash.slice(1);if(!h)return null;
  const s={};h.split('&').forEach(p=>{const[k,v]=p.split('=');if(k&&v)s[k]=decodeURIComponent(v);});
  return s;
}

// --- Load pipeline: parallel fetches, progressive rendering ---
let _prevModel='',_prevMode='';
function _yieldFrame(){return new Promise(r=>requestAnimationFrame(r));}

async function loadAll(){
  const newModel=document.getElementById('sm').value,newMode=document.getElementById('smd').value;
  const isSameModel=newModel===_prevModel;
  const _ld=document.getElementById('loading');if(_ld)_ld.style.display='flex';
  document.getElementById('st').textContent='Loading...';
  try{
  // Phase 1: parallel fetch of metadata + scores (the two biggest waits)
  const [dmResult,scoreResp]=await Promise.all([
    api(`decomp-meta/${newModel}/${newMode}`),
    fetch(`/api/scores/${newModel}/${newMode}`)
  ]);
  if(dmResult.error){document.getElementById('st').textContent=dmResult.error;if(_ld)_ld.style.display='none';return;}
  dm=dmResult;model=newModel;mode=newMode;
  nL=dm.n_layers;_nRealLayers=dm.n_real_layers||nL;

  // Phase 2: parse scores binary + fetch layer0 metadata in parallel
  const [buf,d0]=await Promise.all([
    scoreResp.arrayBuffer(),
    api(`decomp/${model}/${mode}?layer=0`)
  ]);
  scripts=d0.scripts;texts=d0.texts;nN=d0.n_tokens;nK=d0.n_components;tokenIds=d0.token_ids||[];
  document.getElementById('ntok').textContent=nN+' tok / '+nK+' PC';
  document.getElementById('st').textContent='Parsing...';

  // Parse binary scores
  const dv=new DataView(buf);
  const bnL=dv.getUint32(4,true),bnN=dv.getUint32(8,true),bnK=dv.getUint32(12,true);const varOff=16;_layerVar=[];
  for(let l=0;l<bnL;l++){const v=new Float32Array(bnK);for(let k=0;k<bnK;k++)v[k]=dv.getFloat32(varOff+(l*bnK+k)*4,true);_layerVar.push(v);}
  const scoreOff=varOff+bnL*bnK*4;const sU16=new Uint16Array(buf,scoreOff,bnL*bnN*bnK);
  const aF=new Float32Array(bnL*bnN*bnK);for(let i=0;i<sU16.length;i++)aF[i]=f16(sU16[i]);
  allL=[];for(let l=0;l<bnL;l++){const ls=[];const off=l*bnN*bnK;for(let t=0;t<bnN;t++)ls.push(aF.subarray(off+t*bnK,off+t*bnK+bnK));allL.push(ls);}

  // Legend
  _hiddenScripts.clear();
  const lg=document.getElementById('legend2');lg.textContent='';const ss={};scripts.forEach(s=>ss[s]=(ss[s]||0)+1);
  Object.entries(ss).sort((a,b)=>b[1]-a[1]).filter(([,c])=>c>5).forEach(([s,c])=>{
    const d=document.createElement('div');d.className='lg';d.dataset.script=s;
    const dt=document.createElement('span');dt.className='ld';dt.style.background=CLh[s]||'#aaa';
    d.appendChild(dt);d.appendChild(document.createTextNode(s+'('+c+')'));
    d.addEventListener('click',()=>{
      if(_hiddenScripts.has(s)){_hiddenScripts.delete(s);d.classList.remove('off');}
      else{_hiddenScripts.add(s);d.classList.add('off');}
      _applyFilter();
    });
    lg.appendChild(d);
  });

  // --- State preservation across model switches ---
  // Save current pins by token text for cross-model matching
  const prevPinTextA=pinnedToken>=0?texts[pinnedToken]:null;
  const prevPinTextB=pinnedTokenB>=0?texts[pinnedTokenB]:null;
  const prevPairs=isSameModel?[vpPairs[0].slice(),vpPairs[2].slice()]:null;
  const prevLayer=isSameModel?cL:0;

  // Reset interaction state
  pinnedToken=-1;pinnedTokenB=-1;hoveredToken=-1;_lastDimState=-1;_trajCache={};_wlData=null;_wlBuiltKey='';
  const _tsEl=document.getElementById('tsearch');if(_tsEl)_tsEl.value='';
  const _tsR=document.getElementById('tsresults');if(_tsR)_tsR.textContent='';

  // Preserve cameras across switches (don't reset if user has been orbiting)
  if(!isSameModel){views.forEach(v=>{v.cam.position.set(0,0,2.5);v.ctl.target.set(0,0,0);v.ctl.update();v._fitted=false;});brCam._fitted=false;}

  // Restore PC pairs (keep previous if same model, or from URL, or defaults)
  const _rst=_loadState();let _rstL=prevLayer;
  if(_rst&&_rst.m===model&&_rst.d===mode){
    if(_rst.p){const pp=_rst.p.split(',').map(s=>s.split('-').map(Number));if(pp[0]&&pp[0].length===2)vpPairs[0]=pp[0];if(pp[1]&&pp[1].length===2)vpPairs[2]=pp[1];}
    if(_rst.l!==undefined)_rstL=Math.min(parseInt(_rst.l)||0,_nRealLayers-1);
    if(_rst.a!==undefined){const a=parseInt(_rst.a);if(a>=0&&a<nN)pinnedToken=a;}
    if(_rst.b!==undefined){const b=parseInt(_rst.b);if(b>=0&&b<nN)pinnedTokenB=b;}
  }else if(prevPairs){
    vpPairs[0]=prevPairs[0].map(p=>Math.min(p,nK-1));
    vpPairs[2]=prevPairs[1].map(p=>Math.min(p,nK-1));
    vpPairs[1]=prevPairs[1].map(p=>Math.min(p,nK-1));
    _rstL=Math.min(prevLayer,_nRealLayers-1);
  }else{vpPairs[0]=[0,1];vpPairs[2]=[2,3];}// delta (vpPairs[1]) auto-derived

  // Cross-model token matching: find same token text in new model
  if(pinnedToken<0&&prevPinTextA){const idx=texts.indexOf(prevPinTextA);if(idx>=0)pinnedToken=idx;}
  if(pinnedTokenB<0&&prevPinTextB){const idx=texts.indexOf(prevPinTextB);if(idx>=0)pinnedTokenB=idx;}

  // Phase 3: show clouds immediately, then build heavy stuff async
  _clearBrowserSelBoxes();_lastPK='';// force precompute on first setLayer
  setLayer(_rstL);showPinDetail(pinnedToken);updatePinMarkers();
  document.getElementById('st').textContent=`${model}/${mode} ${nN}tok ${nL}L`;
  _prevModel=model;_prevMode=mode;
  }catch(e){document.getElementById('st').textContent='Error: '+e.message;console.error(e);}
  finally{if(_ld)_ld.style.display='none';}

  // Phase 4: heavy builds in background (don't block interaction)
  await _yieldFrame();
  try{loadGateHeatmap();}catch(e){console.error('gate:',e);}
  await _yieldFrame();
  try{buildLeftViewports();}catch(e){console.error('left:',e);}
  await _yieldFrame();
  try{buildBrowser();}catch(e){console.error('browser:',e);}
  _markDirty();
}
async function init(){const models=await api('models');const sel=document.getElementById('sm');const tM=models.filter(m=>m.architecture==='transformer');const bm={};tM.forEach(m=>{if(!bm[m.model])bm[m.model]=[];bm[m.model].push(m.mode);});Object.keys(bm).sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
  // Restore from URL or default to smollm2-135m
  const _st=_loadState();
  if(_st&&_st.m&&bm[_st.m]){sel.value=_st.m;if(_st.d)document.getElementById('smd').value=_st.d;}
  else{const prefer=['smollm2-135m','smollm2-360m','qwen-0.5b'];for(const p of prefer){if(bm[p]){sel.value=p;break;}}}
  document.getElementById('bl').addEventListener('click',loadAll);
  document.getElementById('lemb').addEventListener('click',()=>{if(nL>_nRealLayers)setLayer(_nRealLayers);else setLayer(0);});
  document.getElementById('llmh').addEventListener('click',()=>{if(nL>_nRealLayers+1)setLayer(_nRealLayers+1);else setLayer(_nRealLayers-1);});
  document.getElementById('lprev').addEventListener('click',()=>{if(_nRealLayers)setLayer((cL-1+_nRealLayers)%_nRealLayers);});
  document.getElementById('lnext').addEventListener('click',()=>{if(_nRealLayers)setLayer((cL+1)%_nRealLayers);});
  document.getElementById('lplay').addEventListener('click',_togglePlay);
  // Token search (debounced, event delegation)
  let _searchTimer=null;
  const _tsResults=document.getElementById('tsresults');
  _tsResults.addEventListener('click',e=>{const d=e.target.closest('[data-ti]');if(!d)return;const i=parseInt(d.dataset.ti);if(e.shiftKey||_isRightClick(e)){pinnedTokenB=i;}else{pinnedToken=i;}updatePinMarkers();showPinDetail(pinnedToken);_updateBrowserOverlay();updateLeftViewports();});
  _tsResults.addEventListener('contextmenu',e=>{e.preventDefault();const d=e.target.closest('[data-ti]');if(!d)return;pinnedTokenB=parseInt(d.dataset.ti);updatePinMarkers();showPinDetail(pinnedToken);_updateBrowserOverlay();updateLeftViewports();});
  document.getElementById('tsearch').addEventListener('input',e=>{
    clearTimeout(_searchTimer);
    _searchTimer=setTimeout(()=>{
      const q=e.target.value.toLowerCase().trim();_tsResults.textContent='';
      if(!q||q.length<1||!texts.length)return;
      const frag=document.createDocumentFragment();let count=0;
      for(let i=0;i<texts.length&&count<20;i++){
        if((texts[i]||'').toLowerCase().includes(q)){
          const d=document.createElement('div');d.style.cssText='cursor:pointer;padding:1px 0;border-bottom:1px solid #111';
          d.textContent=`#${i} ${texts[i]} [${scripts[i]}]`;d.dataset.ti=i;
          frag.appendChild(d);count++;
        }
      }
      if(!count){const d=document.createElement('div');d.textContent='no matches';frag.appendChild(d);}
      _tsResults.appendChild(frag);
    },150);
  });
  loadAll();}
init().catch(e=>{console.error('init failed:',e);document.getElementById('loading').style.display='none';document.getElementById('st').textContent='Error: '+e.message;});
// --- RAF-based playback (replaces setInterval) ---
let _playRAF=null,_playLastT=0;
const _playMS=100; // ms per layer — 10 layers/sec, full sweep in 3s at 30 layers
function _playFrame(t){
  if(!play)return;
  if(t-_playLastT>=_playMS){_playLastT=t;setLayer((cL+1)%_nRealLayers,true);}
  _playRAF=requestAnimationFrame(_playFrame);
}
function _togglePlay(){
  play=!play;document.getElementById('lplay').textContent=play?'\u23F8':'\u25B6';
  if(play){_playLastT=performance.now();_playRAF=requestAnimationFrame(_playFrame);}
  else{if(_playRAF){cancelAnimationFrame(_playRAF);_playRAF=null;}_updateBrowserLayer();_updateBrowserSelBoxes();_updateBrowserOverlay();if(pinnedToken>=0){updatePinMarkers();showPinDetail(pinnedToken);}}
}
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;if(e.key==='ArrowRight')setLayer((cL+1)%_nRealLayers);if(e.key==='ArrowLeft')setLayer((cL-1+_nRealLayers)%_nRealLayers);if(e.key===' '){e.preventDefault();_togglePlay();}if(e.key==='Escape'&&(pinnedToken>=0||pinnedTokenB>=0)){pinnedToken=-1;pinnedTokenB=-1;updatePinMarkers();highlightToken(-1);showPinDetail(-1);_updateBrowserOverlay();}});
let _needsRender=true;
function _markDirty(){_needsRender=true;}
views.forEach(v=>v.ctl.addEventListener('change',_markDirty));
brCtl.addEventListener('change',_markDirty);
leftViews.forEach(v=>v.ctl.addEventListener('change',_markDirty));
(function anim(){requestAnimationFrame(anim);
  const damping=views.some(v=>v.ctl.enableDamping&&v.ctl._needsUpdate)||brCtl._needsUpdate||leftViews.some(v=>v.ctl._needsUpdate);
  if(!_needsRender&&!damping&&!play)return;
  _needsRender=false;
  // Single renderer: clear once, render each region with scissor
  rdr.setScissorTest(false);rdr.setClearColor(0x151515);rdr.clear();rdr.setScissorTest(true);
  views.forEach((v,vi)=>{v.ctl.update();const d=v.cam.position.length();const ps=Math.min(0.15,Math.max(0.004,d*0.012));v.mtl.size=ps;
    if(vi>=NC&&v.trajMarker)v.trajMarker.material.size=Math.min(0.1,Math.max(0.006,d*0.015));
    // Scale pin/hover markers with zoom
    const ms=Math.min(0.2,Math.max(0.01,d*0.04));
    if(pinMarkers[vi].visible)pinMarkers[vi].material.size=ms;
    if(pinMarkersB[vi].visible)pinMarkersB[vi].material.size=ms;
    if(highlightMarkers[vi].visible)highlightMarkers[vi].material.size=ms*0.7;
    _renderRegion(v.el,v.sc,v.cam);});
  brCtl.update();_renderRegion(brEl,brSc,brCam);
  leftViews.forEach(v=>{if(v.built){v.ctl.update();_renderRegion(v.el,v.sc,v.cam);}});})();
// WebSocket disabled — not needed for static data viewing
</script>
