<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Heinrich</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ccc;font-family:'SF Mono','Menlo',monospace;font-size:11px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#bar{height:24px;display:flex;align-items:center;gap:5px;padding:0 8px;background:#111;border-bottom:1px solid #222;flex-shrink:0}
#bar select,#bar input,#bar button{background:#1a1a1a;border:1px solid #333;color:#ccc;padding:1px 4px;font-family:inherit;font-size:9px;border-radius:2px;cursor:pointer}
#main{flex:1;display:flex;overflow:hidden}

/* Left: depth stack */
#left{width:25%;display:flex;flex-direction:column;border-right:1px solid #1a1a1a;overflow:hidden}
#left .hd{padding:2px 5px;font-size:8px;color:#555;border-bottom:1px solid #161616;display:flex;gap:3px;align-items:center;flex-shrink:0}
#left .hd select{background:#1a1a1a;border:1px solid #333;color:#ccc;padding:0 2px;font-size:8px;border-radius:2px}
#ls2{flex:1;display:flex;flex-direction:column;gap:0;overflow:hidden}
.lr{flex:1;position:relative;cursor:pointer;border-bottom:1px solid #080808;min-height:0}
.lr:hover{background:#151515}
.lr.act{background:#1a1a2a;border-left:2px solid #4477AA}
.lr canvas{width:100%;height:100%}
.lr .lb{position:absolute;left:1px;top:0;font-size:7px;color:#444;pointer-events:none;z-index:1}

/* Middle: 4 viewports */
#mid{width:50%;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:#151515;overflow:hidden}
.vp{position:relative;overflow:hidden;background:#0a0a0a}
.vp canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.vp .badge{position:absolute;bottom:3px;left:4px;font-size:8px;color:#444;pointer-events:none;z-index:2}
.vp .axes{position:absolute;top:3px;right:4px;font-size:8px;color:#444;pointer-events:none;z-index:2}
#detail{position:absolute;background:rgba(8,8,8,0.95);border:1px solid #444;border-radius:4px;padding:8px 12px;display:none;z-index:30;pointer-events:none;font-size:10px;min-width:200px;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,0.8)}
#detail .tok{font-size:20px;font-weight:bold;color:#fff;margin-bottom:4px;word-break:break-all}
#detail .meta{color:#888;font-size:9px;white-space:pre;line-height:1.5}
.vp .info{position:absolute;top:3px;left:4px;font-size:9px;pointer-events:none;z-index:2}
.vp .info .t{font-weight:bold}
.vp .info .s{font-weight:bold;margin-left:4px}

/* Right: PC slices */
#right{width:25%;display:flex;flex-direction:column;border-left:1px solid #1a1a1a;overflow:hidden}
#right .hd{padding:2px 5px;font-size:8px;color:#555;border-bottom:1px solid #161616;flex-shrink:0}
#sg{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:1px;padding:1px;overflow:hidden}
.sl{background:#0d0d0d;position:relative;cursor:pointer;overflow:hidden}
.sl canvas{width:100%;height:100%}
.sl .sll{position:absolute;top:0;left:1px;font-size:7px;color:#444;pointer-events:none;z-index:1}
.sl:hover{outline:1px solid #4477AA}
.sl.act{outline:1px solid #FF6644}

/* Legend overlay */
#legend{position:absolute;top:28px;right:26%;font-size:8px;line-height:1.3;text-align:right;z-index:10;pointer-events:none;padding:4px}
.lg{display:flex;align-items:center;gap:3px;justify-content:flex-end}
.ld{width:4px;height:4px;border-radius:50%;flex-shrink:0}

/* scrub removed — layer selection via left panel click */
</style>
</head>
<body>
<div id="bar">
  <select id="sm"></select>
  <select id="smd"><option>raw</option><option>naked</option><option>template</option></select>
  <input id="in" type="number" value="10" style="width:28px" title="% of max tokens">%
  <button id="bl">Load</button>
  <span style="flex:1"></span>
  <span id="st" style="color:#444;font-size:8px"></span>
</div>
<div id="main">
  <div id="left">
    <div class="hd"><select id="lpc1"></select> × <select id="lpc2"></select></div>
    <div id="ls2"></div>
  </div>
  <div id="mid">
    <div class="vp" id="vp0"><canvas id="c0"></canvas><div class="info" id="info0"><span class="t" id="ht"></span><span class="s" id="hs"></span><div style="color:#555;font-size:8px" id="hst"></div></div><div class="axes" id="ax0"></div></div>
    <div class="vp" id="vp1"><canvas id="c1"></canvas><div class="axes" id="ax1"></div></div>
    <div class="vp" id="vp2"><canvas id="c2"></canvas><div class="axes" id="ax2"></div></div>
    <div class="vp" id="vp3"><canvas id="c3"></canvas><div class="axes" id="ax3"></div></div>
  </div>
  <div id="right">
    <div class="hd">L<span id="rl">00</span> <span id="ri" style="color:#444"></span></div>
    <div id="sg"></div>
  </div>
  <div id="legend"></div>
  <div id="detail"><div class="tok" id="tt"></div><div class="meta" id="tm"></div></div>
</div>
<!-- layer selection via left panel click + arrow keys -->

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const CL={latin:0x4477AA,CJK:0xEE6677,Cyrillic:0x228833,code:0xCCBB44,Arabic:0x66CCEE,Japanese:0xAA3377,Korean:0x999999,Thai:0x44BB99,Hebrew:0xEE8866,other:0xAAAAAA,special:0x666666};
const CLh=Object.fromEntries(Object.entries(CL).map(([k,v])=>[k,'#'+v.toString(16).padStart(6,'0')]));

let allL=[],dm=null,cL=0,play=false,pT=null;
let selA=0,selB=1; // selected PC pair (from right panel click)
let lpcA=0,lpcB=1; // left panel PC pair
let model='',mode='',scripts=[],texts=[],nN=0,nK=0,nL=0;
const api=p=>fetch('/api/'+p).then(r=>r.json());
function f16(h){const s=(h>>15)&1,e=(h>>10)&0x1f,m=h&0x3ff;if(e===0)return(s?-1:1)*2**-14*(m/1024);if(e===31)return m?NaN:(s?-Infinity:Infinity);return(s?-1:1)*2**(e-15)*(1+m/1024);}

// === 4 three.js viewports ===
const views=[];
for(let v=0;v<4;v++){
  const el=document.getElementById('vp'+v);
  const cv=document.getElementById('c'+v);
  const sc=new THREE.Scene();sc.background=new THREE.Color(v===2?0x080808:0x0a0a0a);
  const cam=new THREE.PerspectiveCamera(50,1,0.001,200);cam.position.set(0,0,2.5);
  const rdr=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  const ctl=new OrbitControls(cam,cv);ctl.enableDamping=true;ctl.dampingFactor=0.08;ctl.minDistance=0.005;
  const geo=new THREE.BufferGeometry();
  const mtl=new THREE.PointsMaterial({size:0.02,vertexColors:true,transparent:true,opacity:0.85,sizeAttenuation:true,depthWrite:false});
  const pts=new THREE.Points(geo,mtl);sc.add(pts);
  views.push({el,cv,sc,cam,rdr,ctl,geo,mtl,pts,pcX:0,pcY:1,pcZ:2,layer:0,trajGroup:null});
}

// Link orbits: left pair shares rotation, right pair shares rotation
// Top-left(0) ↔ Bottom-left(2), Top-right(1) ↔ Bottom-right(3)
let syncing=false;
function syncCam(src,dst){
  if(syncing)return;syncing=true;
  dst.cam.position.copy(src.cam.position);dst.cam.quaternion.copy(src.cam.quaternion);
  dst.ctl.target.copy(src.ctl.target);
  syncing=false;
}
views[0].ctl.addEventListener('change',()=>syncCam(views[0],views[2]));
views[2].ctl.addEventListener('change',()=>syncCam(views[2],views[0]));
views[1].ctl.addEventListener('change',()=>syncCam(views[1],views[3]));
views[3].ctl.addEventListener('change',()=>syncCam(views[3],views[1]));

function resizeV(v){const w=v.el.clientWidth,h=v.el.clientHeight;if(w&&h){v.cam.aspect=w/h;v.cam.updateProjectionMatrix();v.rdr.setSize(w,h);v.rdr.setPixelRatio(devicePixelRatio);}}
function resizeAll(){views.forEach(resizeV);}
addEventListener('resize',resizeAll);
const ro=new ResizeObserver(()=>resizeAll());
views.forEach(v=>ro.observe(v.el));
requestAnimationFrame(resizeAll);

// Raycaster on ALL viewports + cross-highlight
const ray=new THREE.Raycaster();const ms=new THREE.Vector2();
let hoveredToken=-1;

// Highlight markers — one per viewport, shows the hovered token
const highlightMarkers=views.map(v=>{
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(3),3));
  const m=new THREE.PointsMaterial({size:0.06,color:0xFFFFFF,transparent:true,opacity:0.9,sizeAttenuation:true,depthWrite:false});
  const p=new THREE.Points(g,m);p.visible=false;
  v.sc.add(p);return p;
});

function highlightToken(idx){
  hoveredToken=idx;
  views.forEach((v,vi)=>{
    const mk=highlightMarkers[vi];
    if(idx<0){mk.visible=false;return;}
    mk.visible=true;
    const pos=mk.geometry.attributes.position.array;
    if(vi<2){
      // Cloud viewports — use the cloud positions
      const cpos=v.geo.attributes.position?.array;
      if(cpos){pos[0]=cpos[idx*3];pos[1]=cpos[idx*3+1];pos[2]=cpos[idx*3+2];}
    }else{
      // Trajectory viewports — find token at current layer depth
      const S=allL[cL];if(!S)return;
      let mx=0;for(const SS of allL)for(let i=0;i<nN;i++)mx=Math.max(mx,Math.abs(SS[i][v.pcX]||0),Math.abs(SS[i][v.pcY]||0));mx=mx||1;
      pos[0]=(S[idx][v.pcX]||0)/mx;
      pos[1]=(S[idx][v.pcY]||0)/mx;
      pos[2]=(cL/(nL-1))*2-1;
    }
    mk.geometry.attributes.position.needsUpdate=true;
  });
}

function setupRaycast(vi){
  const v=views[vi];
  v.cv.addEventListener('mousemove',e=>{
    if(!nN)return;const r=v.cv.getBoundingClientRect();
    ms.x=((e.clientX-r.left)/r.width)*2-1;ms.y=-((e.clientY-r.top)/r.height)*2+1;
    ray.setFromCamera(ms,v.cam);ray.params.Points.threshold=Math.max(0.008,v.cam.position.length()*0.01);
    const targets=[v.pts];
    if(v.trajGroup)v.trajGroup.children.forEach(c=>{if(c.isPoints)targets.push(c);});
    let hit=null;
    for(const t of targets){const h=ray.intersectObject(t);if(h.length>0){hit=h[0];break;}}
    const td=document.getElementById('detail');
    if(hit){
      const i=hit.index%nN;
      highlightToken(i);
      const S=allL[cL][i];
      document.getElementById('tt').textContent=texts[i]||'?';
      document.getElementById('tt').style.color=CLh[scripts[i]]||'#aaa';
      let m=`${scripts[i]}  #${i}\n\n`;
      for(let p=0;p<Math.min(nK,8);p++)m+=`PC${p}: ${(S[p]||0).toFixed(3)}\n`;
      document.getElementById('tm').textContent=m;
      td.style.left=e.clientX+15+'px';td.style.top=e.clientY-10+'px';
      td.style.transform='none';td.style.display='block';
    }else{highlightToken(-1);td.style.display='none';}
  });
  v.cv.addEventListener('mouseleave',()=>{highlightToken(-1);document.getElementById('detail').style.display='none';});
}
views.forEach((_,i)=>setupRaycast(i));

// === Update a viewport's point cloud ===
function updateVP(vi,pcX,pcY,pcZ,layer){
  const v=views[vi];v.pcX=pcX;v.pcY=pcY;v.pcZ=pcZ;v.layer=layer;
  const S=allL[layer];if(!S)return;
  let pos=v.geo.attributes.position?.array;
  if(!pos||pos.length!==nN*3){
    pos=new Float32Array(nN*3);const col=new Float32Array(nN*3);
    for(let i=0;i<nN;i++){const hex=CL[scripts[i]]||0xAAAAAA;col[i*3]=((hex>>16)&0xFF)/255;col[i*3+1]=((hex>>8)&0xFF)/255;col[i*3+2]=(hex&0xFF)/255;}
    v.geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    v.geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  }
  let mx=0;for(let i=0;i<nN;i++)mx=Math.max(mx,Math.abs(S[i][pcX]||0),Math.abs(S[i][pcY]||0),Math.abs(S[i][pcZ]||0));mx=mx||1;
  for(let i=0;i<nN;i++){pos[i*3]=(S[i][pcX]||0)/mx;pos[i*3+1]=(S[i][pcY]||0)/mx;pos[i*3+2]=(S[i][pcZ]||0)/mx;}
  v.geo.attributes.position.needsUpdate=true;
  v.geo.computeBoundingSphere();
  document.getElementById('ax'+vi).textContent=`${pcX}/${pcY}/${pcZ}`;
  // Auto-fit camera on first load (not on scrub)
  if(!v._fitted){v.cam.position.set(0,0,2.5);v.ctl.target.set(0,0,0);v.ctl.update();v._fitted=true;}
}

// === Update trajectory viewport ===
// Build trajectory geometry ONCE, then only update marker on layer change
function buildTraj(vi,pcX,pcY){
  const v=views[vi];v.pcX=pcX;v.pcY=pcY;
  if(v.trajGroup)v.sc.remove(v.trajGroup);
  if(v.trajMarker)v.sc.remove(v.trajMarker);
  if(v.trajHighlight)v.sc.remove(v.trajHighlight);
  v.sc.remove(v.pts);
  v.trajGroup=new THREE.Group();
  let mx=0;for(const S of allL)for(let i=0;i<nN;i++)mx=Math.max(mx,Math.abs(S[i][pcX]||0),Math.abs(S[i][pcY]||0));
  v._trajScale=mx||1;
  const maxLines=Math.min(nN,800);const step=Math.max(1,Math.floor(nN/maxLines));
  for(let i=0;i<nN;i+=step){
    const pts=[];for(let l=0;l<nL;l++){const S=allL[l];pts.push(new THREE.Vector3((S[i][pcX]||0)/mx,(S[i][pcY]||0)/mx,(l/(nL-1))*2-1));}
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(g,new THREE.LineBasicMaterial({color:CL[scripts[i]]||0xAAAAAA,transparent:true,opacity:0.15,depthWrite:false}));
    line.userData={ti:i};
    v.trajGroup.add(line);
  }
  v.sc.add(v.trajGroup);
  // Layer marker — persistent, just update positions
  const pg=new THREE.BufferGeometry();
  pg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(nN*3),3));
  pg.setAttribute('color',new THREE.BufferAttribute(new Float32Array(nN*3),3));
  v.trajMarker=new THREE.Points(pg,new THREE.PointsMaterial({size:0.012,vertexColors:true,transparent:true,opacity:0.9,sizeAttenuation:true,depthWrite:false}));
  v.sc.add(v.trajMarker);
  // Highlight line for hovered trajectory
  v.trajHighlight=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0.9,linewidth:2}));
  v.trajHighlight.visible=false;
  v.sc.add(v.trajHighlight);
  updateTrajMarker(vi);
  document.getElementById('ax'+vi).textContent=`${pcX}/${pcY}+d`;
}
function updateTrajMarker(vi){
  const v=views[vi];if(!v.trajMarker)return;
  const mx=v._trajScale;const z=(cL/(nL-1))*2-1;const S=allL[cL];
  const pp=v.trajMarker.geometry.attributes.position.array;
  const pc=v.trajMarker.geometry.attributes.color.array;
  for(let i=0;i<nN;i++){
    pp[i*3]=(S[i][v.pcX]||0)/mx;pp[i*3+1]=(S[i][v.pcY]||0)/mx;pp[i*3+2]=z;
    const hex=CL[scripts[i]]||0xAAAAAA;
    pc[i*3]=((hex>>16)&0xFF)/255;pc[i*3+1]=((hex>>8)&0xFF)/255;pc[i*3+2]=(hex&0xFF)/255;
  }
  v.trajMarker.geometry.attributes.position.needsUpdate=true;
  v.trajMarker.geometry.attributes.color.needsUpdate=true;
}
// Highlight one trajectory line across both trajectory viewports
function highlightTraj(tokenIdx){
  [2,3].forEach(vi=>{
    const v=views[vi];if(!v.trajHighlight||!v._trajScale)return;
    if(tokenIdx<0){v.trajHighlight.visible=false;
      v.trajGroup?.children.forEach(c=>{if(c.material)c.material.opacity=0.15;});return;}
    // Build highlight path
    const mx=v._trajScale;const pts=[];
    for(let l=0;l<nL;l++){const S=allL[l];pts.push(new THREE.Vector3((S[tokenIdx][v.pcX]||0)/mx,(S[tokenIdx][v.pcY]||0)/mx,(l/(nL-1))*2-1));}
    v.trajHighlight.geometry.dispose();
    v.trajHighlight.geometry=new THREE.BufferGeometry().setFromPoints(pts);
    v.trajHighlight.visible=true;
    // Dim other lines
    v.trajGroup?.children.forEach(c=>{if(c.material)c.material.opacity=c.userData?.ti===tokenIdx?0.6:0.05;});
  });
}
// Trajectory hover — find nearest line
function setupTrajHover(vi){
  const v=views[vi];
  v.cv.addEventListener('mousemove',e=>{
    if(!nN||!v.trajMarker)return;
    const r=v.cv.getBoundingClientRect();
    ms.x=((e.clientX-r.left)/r.width)*2-1;ms.y=-((e.clientY-r.top)/r.height)*2+1;
    ray.setFromCamera(ms,v.cam);ray.params.Points.threshold=Math.max(0.01,v.cam.position.length()*0.012);
    const h=ray.intersectObject(v.trajMarker);
    const td=document.getElementById('detail');
    if(h.length>0){
      const i=h[0].index;
      highlightTraj(i);highlightToken(i);
      document.getElementById('tt').textContent=texts[i]||'?';
      document.getElementById('tt').style.color=CLh[scripts[i]]||'#aaa';
      // Trajectory summary
      const S0=allL[0][i],SL=allL[nL-1][i];
      let totalMove=0;for(let l=1;l<nL;l++){let d=0;for(let p=0;p<Math.min(nK,10);p++)d+=(allL[l][i][p]-allL[l-1][i][p])**2;totalMove+=Math.sqrt(d);}
      let maxDelta=0,maxL=0;for(let l=1;l<nL;l++){let d=0;for(let p=0;p<Math.min(nK,10);p++)d+=(allL[l][i][p]-allL[l-1][i][p])**2;d=Math.sqrt(d);if(d>maxDelta){maxDelta=d;maxL=l;}}
      let m=`${scripts[i]}  #${i}\n\ntrajectory:\n  total dist: ${totalMove.toFixed(1)}\n  max step: L${maxL} (${maxDelta.toFixed(1)})\n  start PC0: ${(S0[0]||0).toFixed(2)}\n  end PC0: ${(SL[0]||0).toFixed(2)}`;
      document.getElementById('tm').textContent=m;
      td.style.left=e.clientX+15+'px';td.style.top=e.clientY-10+'px';
      td.style.transform='none';td.style.display='block';
    }else{highlightTraj(-1);td.style.display='none';}
  });
  v.cv.addEventListener('mouseleave',()=>{highlightTraj(-1);document.getElementById('detail').style.display='none';});
}
setupTrajHover(2);setupTrajHover(3);

// === Find orthogonal PC pair ===
function orthoPair(a,b){
  const used=new Set([a,b]);
  let oa=-1,ob=-1;
  for(let i=0;i<nK;i++){if(!used.has(i)){if(oa<0)oa=i;else if(ob<0){ob=i;break;}}}
  if(oa<0)oa=0;if(ob<0)ob=1;
  return[oa,ob];
}
function thirdPC(a,b){
  for(let i=0;i<nK;i++){if(i!==a&&i!==b)return i;}return 0;
}

// === Auto-select the 4 viewports ===
// Top row: clouds (current layer). Bottom row: trajectories (all layers + depth)
// Left column: selected pair. Right column: orthogonal pair.
let _lastPair='';
function updateAllViewports(){
  const a=selA,b=selB;
  const c=thirdPC(a,b);
  const[oa,ob]=orthoPair(a,b);
  const oc=thirdPC(oa,ob);
  const pairKey=`${a},${b}`;

  // VP0: cloud, selected pair, current layer
  updateVP(0,a,b,c,cL);
  // VP1: cloud, orthogonal pair, current layer
  updateVP(1,oa,ob,oc,cL);

  // Trajectories: rebuild only when PC pair changes, otherwise just update marker
  if(pairKey!==_lastPair){
    buildTraj(2,a,b);
    buildTraj(3,oa,ob);
    _lastPair=pairKey;
  }else{
    updateTrajMarker(2);
    updateTrajMarker(3);
  }
}

// === Left panel ===
function updateLeft(){
  const stack=document.getElementById('ls2');stack.textContent='';
  for(let l=0;l<nL;l++){
    const row=document.createElement('div');row.className='lr'+(l===cL?' act':'');
    const lbl=document.createElement('div');lbl.className='lb';lbl.textContent='L'+l;row.appendChild(lbl);
    const c=document.createElement('canvas');row.appendChild(c);stack.appendChild(row);
    row.addEventListener('click',()=>setLayer(l));
    requestAnimationFrame(()=>{
      const w=row.clientWidth;const h=row.clientHeight;if(!w||!h)return;
      c.width=w*2;c.height=h*2;c.style.width=w+'px';c.style.height=h+'px';
      const ctx=c.getContext('2d');ctx.scale(2,2);
      const S=allL[l];if(!S)return;
      let mx=0;for(let i=0;i<nN;i++)mx=Math.max(mx,Math.abs(S[i][lpcA]||0),Math.abs(S[i][lpcB]||0));mx=mx||1;
      for(let i=0;i<nN;i++){
        const x=(S[i][lpcA]||0)/mx*w/2.3+w/2;const y=-(S[i][lpcB]||0)/mx*h/2.3+h/2;
        ctx.fillStyle=CLh[scripts[i]]||'#aaa';ctx.globalAlpha=0.3;ctx.fillRect(x-0.5,y-0.5,1.2,1.2);
      }
    });
  }
}

// === Right panel ===
function updateRight(){
  document.getElementById('rl').textContent=String(cL).padStart(2,'0');
  const lm=dm?.layers[cL]||{};
  document.getElementById('ri').textContent=`dim:${lm.intrinsic_dim||'?'} nbr:${(lm.neighbor_stability||0).toFixed(2)}`;
  const grid=document.getElementById('sg');grid.textContent='';
  const S=allL[cL];if(!S)return;
  const pairs=[];const mp=Math.min(nK,8);
  for(let a=0;a<mp;a++)for(let b=a+1;b<mp;b++)pairs.push([a,b]);
  pairs.forEach(([a,b])=>{
    const cell=document.createElement('div');cell.className='sl'+(a===selA&&b===selB?' act':'');
    const lbl=document.createElement('div');lbl.className='sll';lbl.textContent=a+''+b;cell.appendChild(lbl);
    const c=document.createElement('canvas');cell.appendChild(c);grid.appendChild(cell);
    requestAnimationFrame(()=>{
      const sw=cell.clientWidth;const sh=cell.clientHeight;if(!sw||!sh)return;
      c.width=sw*2;c.height=sh*2;c.style.width=sw+'px';c.style.height=sh+'px';
      const ctx=c.getContext('2d');ctx.scale(2,2);
      let mx=0;for(let i=0;i<nN;i++)mx=Math.max(mx,Math.abs(S[i][a]||0),Math.abs(S[i][b]||0));mx=mx||1;
      for(let i=0;i<nN;i++){
        const x=(S[i][a]||0)/mx*sw/2.3+sw/2;const y=-(S[i][b]||0)/mx*sh/2.3+sh/2;
        ctx.fillStyle=CLh[scripts[i]]||'#aaa';ctx.globalAlpha=0.35;ctx.fillRect(x-0.5,y-0.5,1.2,1.2);
      }
    });
    cell.addEventListener('click',()=>{selA=a;selB=b;updateAllViewports();updateRight();});
  });
}

// === HUD ===
function updateHUD(){
  const lm=dm?.layers[cL]||{};const p1=lm.pc1_pct||0;
  let s,co;if(p1>95){s='DOMINANT';co='#FF4444';}else if(p1>50){s='PARTIAL';co='#FFAA44';}else{s='DISTRIBUTED';co='#44FF44';}
  document.getElementById('ht').textContent=model+' L'+String(cL).padStart(2,'0');
  const se=document.getElementById('hs');se.textContent=s;se.style.color=co;
  document.getElementById('hst').textContent=`PC1:${p1}% dim:${lm.intrinsic_dim||'?'} nbr:${(lm.neighbor_stability||0).toFixed(2)}`;
}

function setLayer(l){
  cL=l;updateAllViewports();updateRight();updateHUD();
  document.querySelectorAll('.lr').forEach((r,i)=>r.classList.toggle('act',i===l));
}

// === Load ===
async function loadAll(){
  model=document.getElementById('sm').value;mode=document.getElementById('smd').value;
  document.getElementById('st').textContent='Loading...';
  dm=await api(`decomp-meta/${model}/${mode}`);
  if(dm.error){document.getElementById('st').textContent=dm.error;return;}
  nL=dm.n_layers;
  const d0=await api(`decomp/${model}/${mode}?layer=0`);
  scripts=d0.scripts;texts=d0.texts;nN=d0.n_tokens;nK=d0.n_components;
  // Populate PC selectors
  for(const id of['lpc1','lpc2']){const s=document.getElementById(id);s.textContent='';
    for(let i=0;i<Math.min(nK,20);i++){const o=document.createElement('option');o.value=i;o.textContent='PC'+i;s.appendChild(o);}}
  document.getElementById('lpc1').value=0;document.getElementById('lpc2').value=1;
  // Load binary
  document.getElementById('st').textContent='Loading scores...';
  const resp=await fetch(`/api/scores/${model}/${mode}`);
  const buf=await resp.arrayBuffer();
  const dv=new DataView(buf);
  const bnL=dv.getUint32(4,true),bnN=dv.getUint32(8,true),bnK=dv.getUint32(12,true);
  const varOff=16;
  const scoreOff=varOff+bnL*bnK*4;const sU16=new Uint16Array(buf,scoreOff,bnL*bnN*bnK);
  const aF=new Float32Array(bnL*bnN*bnK);
  for(let i=0;i<sU16.length;i++)aF[i]=f16(sU16[i]);
  allL=[];
  for(let l=0;l<bnL;l++){const ls=[];const off=l*bnN*bnK;
    for(let t=0;t<bnN;t++)ls.push(aF.subarray(off+t*bnK,off+t*bnK+bnK));allL.push(ls);}
  // Legend
  const lg=document.getElementById('legend');lg.textContent='';
  const ss={};scripts.forEach(s=>ss[s]=(ss[s]||0)+1);
  Object.entries(ss).sort((a,b)=>b[1]-a[1]).filter(([,c])=>c>5).forEach(([s,c])=>{
    const d=document.createElement('div');d.className='lg';
    const dt=document.createElement('span');dt.className='ld';dt.style.background=CLh[s]||'#aaa';
    d.appendChild(dt);d.appendChild(document.createTextNode(s+'('+c+')'));lg.appendChild(d);
  });
  views.forEach(v=>{v.cam.position.set(0,0,2.5);v.ctl.target.set(0,0,0);v.ctl.update();});
  views[2].cam.position.set(1.5,0.5,3);views[2].ctl.update();
  selA=0;selB=1;setLayer(0);updateLeft();
  document.getElementById('st').textContent=`${model}/${mode} ${nN}tok ${nL}L`;
}

// === Init ===
async function init(){
  const models=await api('models');const sel=document.getElementById('sm');
  const tM=models.filter(m=>m.architecture==='transformer');
  const bm={};tM.forEach(m=>{if(!bm[m.model])bm[m.model]=[];bm[m.model].push(m.mode);});
  Object.keys(bm).sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
  document.getElementById('bl').addEventListener('click',loadAll);
  document.getElementById('lpc1').addEventListener('change',()=>{lpcA=+document.getElementById('lpc1').value;updateLeft();});
  document.getElementById('lpc2').addEventListener('change',()=>{lpcB=+document.getElementById('lpc2').value;updateLeft();});
  loadAll();
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight')setLayer(Math.min(cL+1,nL-1));
  if(e.key==='ArrowLeft')setLayer(Math.max(cL-1,0));
  // Up/down: cycle PC pair
  if(e.key==='ArrowUp'){e.preventDefault();selA=Math.max(0,selA-1);if(selA===selB)selA=Math.max(0,selA-1);_lastPair='';updateAllViewports();updateRight();}
  if(e.key==='ArrowDown'){e.preventDefault();selA=Math.min(nK-1,selA+1);if(selA===selB)selA=Math.min(nK-1,selA+1);_lastPair='';updateAllViewports();updateRight();}
  if(e.key===' '){e.preventDefault();play=!play;if(play)pT=setInterval(()=>setLayer((cL+1)%nL),300);else clearInterval(pT);}
});

(function anim(){
  requestAnimationFrame(anim);
  views.forEach(v=>{v.ctl.update();const d=v.cam.position.length();v.mtl.size=Math.max(0.004,d*0.012);v.mtl.opacity=d<0.5?0.95:0.8;v.rdr.render(v.sc,v.cam);});
})();
init();

(function wsc(){try{const ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onclose=()=>setTimeout(wsc,5000);ws.onerror=()=>{try{ws.close();}catch(x){}};
}catch(x){}})();
</script>
